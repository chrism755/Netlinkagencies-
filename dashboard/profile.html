<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyCCFExYKkXxauIXVv2HzNHbNnizL6MF_p4",authDomain:"netlink-agencies-6399e.firebaseapp.com",projectId:"netlink-agencies-6399e",storageBucket:"netlink-agencies-6399e.firebasestorage.app",messagingSenderId:"546397751362",appId:"1:546397751362:web:c74e057b2b0ceb6c0745db"});
const auth=getAuth(app),db=getFirestore(app);
const PAGE="profile";
onAuthStateChanged(auth,async u=>{
  if(!u){window.location.replace('/login.html');return;}
  const snap=await getDoc(doc(db,'users',u.uid));
  if(!snap.exists()||!snap.data().activated){window.location.replace('/activate.html');return;}
  const UD=snap.data();
  document.getElementById('av').textContent=UD.username.charAt(0).toUpperCase();
  document.getElementById('un').textContent=UD.username;
  if(PAGE==='community'){
    document.getElementById('pg-title').textContent='Community';
    const ps=await getDocs(collection(db,'communityPosts'));
    const posts=ps.docs.map(d=>({...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    document.getElementById('pg-content').innerHTML=posts.length===0?'<div class="card"><p style="text-align:center;color:var(--text2);">No posts yet. Check back soon!</p></div>':posts.map(p=>'<div class="card"><div style="font-size:10px;color:var(--text2);margin-bottom:8px;">📅 '+(p.createdAt?new Date(p.createdAt.seconds*1000).toLocaleString():'')+'</div><p style="font-size:14px;line-height:1.7;">'+p.content+'</p></div>').join('');
  } else if(PAGE==='help'){
    document.getElementById('pg-title').textContent='Get Help';

  } else if(PAGE==='timetable'){
    document.getElementById('pg-title').textContent='Time Table';
    document.getElementById('pg-content').innerHTML='<div class="card"><h3>🗓️ Weekly Task Schedule</h3><p>Follow this to maximize earnings every week!</p></div><div style="overflow-x:auto;"><table class="tt"><tr><th>Day</th><th>Task</th><th>Reward</th></tr><tr><td><span class="day">Monday</span></td><td>TikTok Videos ×3</td><td style="color:var(--gold);">KES 45</td></tr><tr><td><span class="day">Tuesday</span></td><td>Trivia Quiz ×6</td><td style="color:var(--gold);">KES 30</td></tr><tr><td><span class="day">Wednesday</span></td><td>Instagram Videos ×3</td><td style="color:var(--gold);">KES 60</td></tr><tr><td><span class="day">Thursday</span></td><td>Math Quiz ×6</td><td style="color:var(--gold);">KES 60</td></tr><tr><td><span class="day">Friday</span></td><td>YouTube Videos ×3</td><td style="color:var(--gold);">KES 75</td></tr><tr><td><span class="day">Saturday</span></td><td>Daily Survey ×3</td><td style="color:var(--gold);">KES 15</td></tr><tr><td><span class="day">Sunday</span></td><td>Number Game + Ads</td><td style="color:var(--gold);">KES 25+</td></tr></table></div><div class="card" style="margin-top:12px;"><h3>💡 Tips</h3><p>• Complete all tasks daily<br>• Share referral link every day<br>• Post WhatsApp advert weekly<br>• Check community for bonus tasks</p></div>';
  } else if(PAGE==='profile'){
    document.getElementById('pg-title').textContent='Profile';
    document.getElementById('pg-content').innerHTML='<div style="text-align:center;padding:20px 0 16px;"><div class="pav">'+UD.username.charAt(0).toUpperCase()+'</div><div style="font-family:Orbitron,monospace;font-size:17px;font-weight:900;color:#fff;">'+UD.username+'<span class="badge">✔ Verified</span></div></div><div class="prow"><div class="pl">Email</div><div class="pv">'+UD.email+'</div></div><div class="prow"><div class="pl">Phone</div><div class="pv">'+UD.phone+'</div></div><div class="prow"><div class="pl">WhatsApp</div><div class="pv">'+UD.whatsapp+'</div></div><div class="prow"><div class="pl">Country</div><div class="pv">'+UD.country+'</div></div><div class="prow"><div class="pl">Referral Code</div><div class="pv" style="color:var(--accent);">'+UD.referralCode+'</div></div><div class="prow"><div class="pl">Account Balance</div><div class="pv" style="color:var(--gold);">KES '+(UD.balance||0)+'</div></div><div class="prow"><div class="pl">Total Earnings</div><div class="pv" style="color:var(--green);">KES '+(UD.totalEarnings||0)+'</div></div>';
  }
