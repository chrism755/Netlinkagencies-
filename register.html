<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Register — NETLINK AGENCIES</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--primary:#E91E63;--accent:#FF1493;--green:#00C853;--red:#FF3B3B;--bg:#E91E63;--bg3:#F5F5F5;--card:#FFFFFF;--border:#E0E0E0;--text:#1A1A1A;--text2:#666666;--white:#FFFFFF;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#E91E63,#FF1493,#E91E63);color:var(--text);min-height:100vh;}
.bg{position:fixed;inset:0;pointer-events:none;}
.bg::before{content:'';position:absolute;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(255,255,255,.1),transparent 70%);border-radius:50%;}
.bg::after{content:'';position:absolute;bottom:-200px;right:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(255,255,255,.08),transparent 70%);border-radius:50%;}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:40px 16px 60px;}
.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:20px;}
.logo-icon{width:60px;height:60px;background:linear-gradient(135deg,#00C853,#66BB6A);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 8px 20px rgba(0,0,0,.2);}
.logo-text{font-family:'Orbitron',monospace;font-weight:900;font-size:18px;color:var(--white);line-height:1.1;}
.logo-sub{font-size:10px;color:rgba(255,255,255,.9);letter-spacing:2px;font-family:'Orbitron',monospace;}
h1{font-family:'Nunito',sans-serif;font-size:24px;font-weight:800;color:var(--white);margin-bottom:6px;text-align:center;}
.sub{color:rgba(255,255,255,.95);font-size:14px;text-align:center;margin-bottom:30px;}
.card{background:var(--card);border:none;border-radius:20px;padding:32px 24px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.stitle{display:none;}
.fg{margin-bottom:16px;}
label{display:block;font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;letter-spacing:.5px;text-transform:none;}
input,select{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:12px 15px;color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;outline:none;transition:.2s;}
input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(233,30,99,.1);}
input::placeholder{color:var(--text2);opacity:.7;}
select option{background:var(--bg3);color:var(--text);}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;background:linear-gradient(135deg,var(--primary),var(--accent));color:var(--white);transition:.3s;box-shadow:0 8px 20px rgba(233,30,99,.3);}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 25px rgba(233,30,99,.4);}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.err{background:rgba(255,59,59,.12);border:1.5px solid var(--red);color:#FF3B3B;border-radius:10px;padding:12px 15px;font-size:13px;font-weight:600;margin:10px 0;display:none;}
.link{text-align:center;margin-top:18px;font-size:13px;color:var(--text2);}
.link a{color:var(--primary);font-weight:700;text-decoration:none;}
.ref-box{background:rgba(233,30,99,.1);border:1px solid var(--primary);border-radius:8px;padding:10px;font-size:12px;color:var(--primary);margin-bottom:12px;display:none;font-weight:600;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <div class="logo"><div class="logo-icon">🔗</div><div><div class="logo-text">NETLINK</div><div class="logo-sub">AGENCIES</div></div></div>
  <h1>Create Account</h1>
  <p class="sub">Linking You to Financial Solutions</p>
  <div class="card">
    <div class="ref-box" id="ref-box">🔗 Referred by: <strong id="ref-by"></strong></div>
    <div class="fg"><label>Username</label><input id="username" type="text" placeholder="Enter username"/></div>
    <div class="fg"><label>Email Address</label><input id="email" type="email" placeholder="e.g. john@gmail.com"/></div>
    <div class="fg"><label>Phone Number</label><input id="phone" type="tel" placeholder="e.g. 0712345678"/></div>
    <div class="fg"><label>WhatsApp Number</label><input id="whatsapp" type="tel" placeholder="+254712345678"/></div>
    <div class="fg"><label>Country</label>
      <select id="country">
        <option value="">Select your country</option>
        <option>Kenya</option><option>Uganda</option><option>Tanzania</option>
        <option>Rwanda</option><option>Nigeria</option><option>Ghana</option>
        <option>South Africa</option><option>United States</option>
        <option>United Kingdom</option><option>Other</option>
      </select>
    </div>
    <div class="fg"><label>Password</label><input id="password" type="password" placeholder="Enter password"/></div>
    <div class="fg"><label>Confirm Password</label><input id="confirm" type="password" placeholder="Repeat password"/></div>
    <div class="err" id="err"></div>
    <button class="btn" id="btn" onclick="doRegister()">🚀 Create Account</button>
    <div class="link">Already have an account? <a href="/login.html">Log In</a></div>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, collection, query, where, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCCFExYKkXxauIXVv2HzNHbNnizL6MF_p4",
  authDomain:"netlink-agencies-6399e.firebaseapp.com",
  projectId:"netlink-agencies-6399e",
  storageBucket:"netlink-agencies-6399e.firebasestorage.app",
  messagingSenderId:"546397751362",
  appId:"1:546397751362:web:c74e057b2b0ceb6c0745db"
});
const auth = getAuth(app);
const db = getFirestore(app);

// Check referral
const ref = new URLSearchParams(window.location.search).get('ref');
if(ref){
  document.getElementById('ref-box').style.display='block';
  document.getElementById('ref-by').textContent=ref;
}

// Validate WhatsApp number has country code
function isValidWhatsApp(number) {
  // Must start with + or country code digits
  const cleaned = number.replace(/[\s\-\+]/g, '');
  // Check if it's 10-15 digits (includes country code)
  return /^\d{10,15}$/.test(cleaned);
}

// Check for duplicate username
async function isUsernameTaken(username) {
  try {
    const q = query(collection(db, 'users'), where('username', '==', username.toLowerCase()));
    const snapshot = await getDocs(q);
    return !snapshot.empty;
  } catch (e) {
    return false;
  }
}

// Check for duplicate email
async function isEmailTaken(email) {
  try {
    const q = query(collection(db, 'users'), where('email', '==', email.toLowerCase()));
    const snapshot = await getDocs(q);
    return !snapshot.empty;
  } catch (e) {
    return false;
  }
}

// Check for duplicate phone
async function isPhoneTaken(phone) {
  try {
    const q = query(collection(db, 'users'), where('phone', '==', phone));
    const snapshot = await getDocs(q);
    return !snapshot.empty;
  } catch (e) {
    return false;
  }
}

window.doRegister = async function(){
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  err.style.display='none';

  const u = document.getElementById('username').value.trim();
  const e = document.getElementById('email').value.trim();
  const ph = document.getElementById('phone').value.trim();
  const wa = document.getElementById('whatsapp').value.trim();
  const co = document.getElementById('country').value;
  const pw = document.getElementById('password').value;
  const cp = document.getElementById('confirm').value;

  // Validate all fields
  if(!u||!e||!ph||!wa||!co||!pw||!cp){
    err.textContent='⚠️ Please fill all fields.';
    err.style.display='block';
    return;
  }

  // Validate email format
  if(!e.includes('@')){
    err.textContent='⚠️ Enter a valid email.';
    err.style.display='block';
    return;
  }

  // Validate passwords match
  if(pw!==cp){
    err.textContent='⚠️ Passwords do not match.';
    err.style.display='block';
    return;
  }

  // Validate password length
  if(pw.length<6){
    err.textContent='⚠️ Password must be at least 6 characters.';
    err.style.display='block';
    return;
  }

  // Validate WhatsApp has country code
  if(!isValidWhatsApp(wa)){
    err.textContent='⚠️ WhatsApp number must start with country code (e.g., +254712345678).';
    err.style.display='block';
    return;
  }

  // Show spinner on button
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span> Checking...';

  try{
    // Check for duplicate username
    if(await isUsernameTaken(u)){
      throw new Error('username_taken');
    }

    // Check for duplicate email
    if(await isEmailTaken(e)){
      throw new Error('email_already_in_use');
    }

    // Check for duplicate phone
    if(await isPhoneTaken(ph)){
      throw new Error('phone_taken');
    }

    // Show creating message
    btn.innerHTML='<span class="spinner"></span> Creating...';

    // 1. Create auth account
    const cred = await createUserWithEmailAndPassword(auth, e, pw);
    const uid = cred.user.uid;
    const refCode = u.toLowerCase().replace(/\s+/g,'').replace(/[^a-z0-9]/g,'');

    // 2. Save user data
    await setDoc(doc(db,'users',uid),{
      uid, 
      username:u.toLowerCase(), 
      email:e.toLowerCase(), 
      phone:ph, 
      whatsapp:wa, 
      country:co,
      activated:false, 
      referralCode:refCode, 
      referredBy:ref||'',
      balance:0, 
      totalEarnings:0, 
      withdrawn:0, 
      pending:0,
      weeklyBonus:0, 
      karibu:0, 
      level1Count:0, 
      level2Count:0, 
      level3Count:0,
      createdAt:serverTimestamp()
    });

    // 3. Save uid to localStorage then redirect
    localStorage.setItem('nlUID', uid);
    localStorage.setItem('nlActivated', 'false');
    localStorage.removeItem('nlAdmin');
    window.location.replace('https://netlinkagencies.linkpc.net/activate.html');

  }catch(e2){
    btn.disabled=false;
    btn.innerHTML='🚀 Create Account';
    
    let msg = e2.message;
    if(msg === 'username_taken') msg='⚠️ Username already used, please enter different username.';
    else if(msg === 'email_already_in_use' || msg.includes('email-already-in-use')) msg='⚠️ This email is already registered. Please log in.';
    else if(msg === 'phone_taken') msg='⚠️ This phone number is already registered.';
    else if(msg.includes('invalid-email')) msg='⚠️ Invalid email address.';
    else if(msg.includes('weak-password')) msg='⚠️ Password is too weak.';
    
    err.textContent=msg;
    err.style.display='block';
  }
};
</script>
</body>
</html>
