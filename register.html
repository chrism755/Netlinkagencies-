<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Register — NETLINK AGENCIES</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--primary:#0057FF;--accent:#00D4FF;--gold:#FFD700;--green:#00C853;--red:#FF3B3B;--bg:#050D1A;--bg2:#0A1628;--bg3:#0F1F3D;--card:#111E35;--border:#1E3560;--text:#E8F0FF;--text2:#8BA4CC;--white:#FFFFFF;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.bg{position:fixed;inset:0;pointer-events:none;}
.bg::before{content:'';position:absolute;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(0,87,255,.15),transparent 70%);border-radius:50%;}
.bg::after{content:'';position:absolute;bottom:-200px;right:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(0,212,255,.1),transparent 70%);border-radius:50%;}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:30px 16px 60px;}
.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:14px;}
.logo-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 24px rgba(0,87,255,.5);}
.logo-text{font-family:'Orbitron',monospace;font-weight:900;font-size:16px;color:var(--white);line-height:1.1;}
.logo-sub{font-size:9px;color:var(--accent);letter-spacing:3px;font-family:'Orbitron',monospace;}
h1{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:var(--white);margin-bottom:6px;text-align:center;}
.sub{color:var(--text2);font-size:13px;text-align:center;margin-bottom:24px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 24px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.stitle{font-family:'Orbitron',monospace;font-size:11px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:18px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.fg{margin-bottom:16px;}
label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;}
input,select{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:12px 15px;color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;outline:none;transition:.2s;}
input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,87,255,.15);}
input::placeholder{color:var(--text2);opacity:.6;}
select option{background:var(--bg3);}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:.2s;background:linear-gradient(135deg,var(--primary),var(--accent));color:var(--white);box-shadow:0 4px 20px rgba(0,87,255,.4);margin-top:4px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.err{background:rgba(255,59,59,.12);border:1.5px solid var(--red);color:#FF8A80;border-radius:10px;padding:12px 15px;font-size:13px;font-weight:600;margin:10px 0;display:none;}
.link{text-align:center;margin-top:16px;font-size:13px;color:var(--text2);}
.link a{color:var(--accent);font-weight:700;text-decoration:none;}
.ref-box{display:none;background:rgba(0,212,255,.08);border:1px solid var(--accent);border-radius:8px;padding:10px;font-size:12px;color:var(--accent);margin-bottom:12px;}
.loader{position:fixed;inset:0;background:rgba(5,13,26,.95);z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;}
.loader.show{display:flex;}
.ring{width:56px;height:56px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.ltxt{font-family:'Orbitron',monospace;color:var(--accent);font-size:12px;letter-spacing:2px;}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="ring"></div><div class="ltxt">CREATING ACCOUNT...</div></div>
<div class="bg"></div>
<div class="wrap">
  <div class="logo"><div class="logo-icon">🔗</div><div><div class="logo-text">NETLINK</div><div class="logo-sub">AGENCIES</div></div></div>
  <h1>Create Account</h1>
  <p class="sub">Join the network and start earning</p>
  <div class="card">
    <div class="stitle">📋 Registration Form</div>
    <div class="ref-box" id="ref-box">🔗 Referred by: <strong id="ref-by"></strong></div>
    <div class="fg"><label>Username</label><input id="username" type="text" placeholder="Choose a username"/></div>
    <div class="fg"><label>Email Address</label><input id="email" type="email" placeholder="Enter valid email"/></div>
    <div class="fg"><label>Phone Number</label><input id="phone" type="tel" placeholder="+254 7XX XXX XXX"/></div>
    <div class="fg"><label>WhatsApp Number</label><input id="whatsapp" type="tel" placeholder="+254 7XX XXX XXX"/></div>
    <div class="fg"><label>Country</label>
      <select id="country"><option value="">-- Select Country --</option>
        <option>Kenya</option><option>Uganda</option><option>Tanzania</option><option>Rwanda</option>
        <option>Nigeria</option><option>Ghana</option><option>South Africa</option>
        <option>United States</option><option>United Kingdom</option><option>Other</option>
      </select>
    </div>
    <div class="fg"><label>Password</label><input id="password" type="password" placeholder="Min 6 characters"/></div>
    <div class="fg"><label>Confirm Password</label><input id="confirm" type="password" placeholder="Repeat password"/></div>
    <div class="err" id="err"></div>
    <button class="btn" id="btn" onclick="doRegister()">🚀 Create Account</button>
    <div class="link">Already have an account? <a href="/login.html">Log In</a></div>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, serverTimestamp, collection, query, where, getDocs, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app = initializeApp({apiKey:"AIzaSyCCFExYKkXxauIXVv2HzNHbNnizL6MF_p4",authDomain:"netlink-agencies-6399e.firebaseapp.com",projectId:"netlink-agencies-6399e",storageBucket:"netlink-agencies-6399e.firebasestorage.app",messagingSenderId:"546397751362",appId:"1:546397751362:web:c74e057b2b0ceb6c0745db"});
const auth=getAuth(app), db=getFirestore(app);
// Check referral
const params=new URLSearchParams(window.location.search);
const ref=params.get('ref');
if(ref){document.getElementById('ref-box').style.display='block';document.getElementById('ref-by').textContent=ref;}
window.doRegister=async function(){
  const u=document.getElementById('username').value.trim();
  const e=document.getElementById('email').value.trim();
  const ph=document.getElementById('phone').value.trim();
  const wa=document.getElementById('whatsapp').value.trim();
  const co=document.getElementById('country').value;
  const pw=document.getElementById('password').value;
  const cp=document.getElementById('confirm').value;
  const err=document.getElementById('err');
  err.style.display='none';
  if(!u||!e||!ph||!wa||!co||!pw||!cp){err.textContent='⚠️ Please fill all fields.';err.style.display='block';return;}
  if(!e.includes('@')){err.textContent='⚠️ Enter a valid email.';err.style.display='block';return;}
  if(pw!==cp){err.textContent='⚠️ Passwords do not match.';err.style.display='block';return;}
  if(pw.length<6){err.textContent='⚠️ Password must be at least 6 characters.';err.style.display='block';return;}
  document.getElementById('btn').disabled=true;
  document.getElementById('loader').classList.add('show');
  try{
    const cred=await createUserWithEmailAndPassword(auth,e,pw);
    const uid=cred.user.uid;
    const refCode=u.toLowerCase().replace(/\s+/g,'');
    await setDoc(doc(db,'users',uid),{
      uid,username:u,email:e,phone:ph,whatsapp:wa,country:co,
      activated:false,referralCode:refCode,referredBy:ref||'',
      balance:0,totalEarnings:0,withdrawn:0,pending:0,
      weeklyBonus:0,karibu:0,level1Count:0,level2Count:0,level3Count:0,
      createdAt:serverTimestamp()
    });
    // Handle referral credit
    if(ref){
      const q1=query(collection(db,'users'),where('referralCode','==',ref));
      const snap=await getDocs(q1);
      if(!snap.empty){
        const refDoc=snap.docs[0];
        await updateDoc(doc(db,'users',refDoc.id),{balance:increment(80),totalEarnings:increment(80),level1Count:increment(1)});
        // level 2
        const refData=refDoc.data();
        if(refData.referredBy){
          const q2=query(collection(db,'users'),where('referralCode','==',refData.referredBy));
          const snap2=await getDocs(q2);
          if(!snap2.empty){
            await updateDoc(doc(db,'users',snap2.docs[0].id),{balance:increment(20),totalEarnings:increment(20),level2Count:increment(1)});
            // level 3
            const ref2Data=snap2.docs[0].data();
            if(ref2Data.referredBy){
              const q3=query(collection(db,'users'),where('referralCode','==',ref2Data.referredBy));
              const snap3=await getDocs(q3);
              if(!snap3.empty){await updateDoc(doc(db,'users',snap3.docs[0].id),{balance:increment(10),totalEarnings:increment(10),level3Count:increment(1)});}
            }
          }
        }
      }
    }
    document.getElementById('loader').classList.remove('show');
    window.location.href='/activation.html';
  }catch(e2){
    document.getElementById('loader').classList.remove('show');
    document.getElementById('btn').disabled=false;
    err.textContent='❌ '+e2.message;err.style.display='block';
  }
};
</script>
</body>
</html>
