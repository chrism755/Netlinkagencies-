<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Register — NETLINK AGENCIES</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--primary:#E91E63;--accent:#FF1493;--green:#00C853;--red:#FF3B3B;--bg:#E91E63;--bg3:#F5F5F5;--card:#FFFFFF;--border:#E0E0E0;--text:#1A1A1A;--text2:#666666;--white:#FFFFFF;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#E91E63,#FF1493,#E91E63);color:var(--text);min-height:100vh;}
.bg{position:fixed;inset:0;pointer-events:none;}
.bg::before{content:'';position:absolute;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(255,255,255,.1),transparent 70%);border-radius:50%;}
.bg::after{content:'';position:absolute;bottom:-200px;right:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(255,255,255,.08),transparent 70%);border-radius:50%;}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:40px 16px 60px;}
.logo{display:flex;align-items:center;gap:15px;justify-content:center;margin-bottom:20px;}
.logo-icon{width:120px;height:120px;position:relative;display:flex;align-items:center;justify-content:center;}
.netlink-logo{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
/* Outer circles */
.network-outer{position:absolute;width:100%;height:100%;border:2px solid rgba(255,20,147,.4);border-radius:50%;animation:pulse 3s ease-in-out infinite;}
.network-middle{position:absolute;width:85%;height:85%;border:1.5px solid rgba(255,20,147,.5);border-radius:50%;animation:pulse 3s ease-in-out infinite .3s;}
/* Center circle with profile picture */
.network-center{position:relative;width:80px;height:80px;background:linear-gradient(135deg,#FF1493,#E91E63);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;cursor:pointer;overflow:hidden;border:3px solid rgba(255,255,255,.6);box-shadow:0 0 25px rgba(255,20,147,.6);}
.network-center img{width:100%;height:100%;object-fit:cover;}
.network-center.default-logo{background:linear-gradient(135deg,#FF1493,#E91E63);}
/* Nodes around the circle */
.node{position:absolute;width:12px;height:12px;background:radial-gradient(circle,#FF1493,#E91E63);border-radius:50%;box-shadow:0 0 15px rgba(255,20,147,.8);}
.node:nth-child(2){top:5%;left:50%;transform:translateX(-50%);}
.node:nth-child(3){top:13%;right:13%;transform:translate(0,0);}
.node:nth-child(4){right:5%;top:50%;transform:translateY(-50%);}
.node:nth-child(5){bottom:13%;right:13%;}
.node:nth-child(6){bottom:5%;left:50%;transform:translateX(-50%);}
.node:nth-child(7){bottom:13%;left:13%;}
.node:nth-child(8){left:5%;top:50%;transform:translateY(-50%);}
.node:nth-child(9){top:13%;left:13%;}
/* Lines connecting nodes */
svg{position:absolute;width:100%;height:100%;top:0;left:0;z-index:1;}
@keyframes pulse{0%,100%{opacity:.6;}50%{opacity:1;}}
.logo-text{font-family:'Orbitron',monospace;font-weight:900;font-size:18px;color:var(--white);line-height:1.1;}
.logo-sub{font-size:10px;color:rgba(255,255,255,.9);letter-spacing:2px;font-family:'Orbitron',monospace;}
h1{font-family:'Nunito',sans-serif;font-size:24px;font-weight:800;color:var(--white);margin-bottom:6px;text-align:center;}
.sub{color:rgba(255,255,255,.95);font-size:14px;text-align:center;margin-bottom:30px;}
.card{background:var(--card);border:none;border-radius:20px;padding:32px 24px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.stitle{display:none;}
.fg{margin-bottom:16px;}
label{display:block;font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;letter-spacing:.5px;text-transform:none;}
input,select{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:12px 15px;color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;outline:none;transition:.2s;}
input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(233,30,99,.1);}
input::placeholder{color:var(--text2);opacity:.7;}
select option{background:var(--bg3);color:var(--text);}
.profile-pic-input{display:none;}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;background:linear-gradient(135deg,var(--primary),var(--accent));color:white;transition:.2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 25px rgba(233,30,99,.4);}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.err{background:rgba(255,59,59,.12);border:1.5px solid var(--red);color:#FF3B3B;border-radius:10px;padding:12px 15px;font-size:13px;font-weight:600;margin:10px 0;display:none;}
.link{text-align:center;margin-top:18px;font-size:13px;color:var(--text2);}
.link a{color:var(--primary);font-weight:700;text-decoration:none;}
.ref-box{background:linear-gradient(135deg,#00C853,#00A651);border:2px solid #00C853;border-radius:12px;padding:14px 16px;font-size:14px;color:#fff;margin-bottom:16px;display:none;font-weight:700;text-align:center;box-shadow:0 4px 15px rgba(0,200,83,.3);}
.ref-box strong{font-size:16px;display:block;margin-top:6px;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

profilePicInput.addEventListener('change', function(e) {
  const file = e.target.files[0];

    reader.onload = function(event) {
      const img = networkCenter.querySelector('img');

function isValidWhatsApp(number) {
  // Must start with + and contain 10-15 digits
  if(!number.startsWith('+')){
    return false;
  }
  const cleaned = number.replace(/[\s\-\+]/g, '');
  return /^\d{10,15}$/.test(cleaned);
}

async function isUsernameTaken(username) {
  try {
    const q = query(collection(db, 'users'), where('username', '==', username.toLowerCase()));
    const snapshot = await getDocs(q);
    return !snapshot.empty;
  } catch (e) {
    return false;
  }
}

async function isEmailTaken(email) {
  try {
    const q = query(collection(db, 'users'), where('email', '==', email.toLowerCase()));
    const snapshot = await getDocs(q);
    return !snapshot.empty;
  } catch (e) {
    return false;
  }
}

async function isPhoneTaken(phone) {
  try {
    const q = query(collection(db, 'users'), where('phone', '==', phone));
    const snapshot = await getDocs(q);
    return !snapshot.empty;
  } catch (e) {
    return false;
  }
}

  const err = document.getElementById('err');
  err.style.display='none';

  const u = document.getElementById('username').value.trim();
  const e = document.getElementById('email').value.trim();
  const ph = document.getElementById('phone').value.trim();
  const wa = document.getElementById('whatsapp').value.trim();
  const co = document.getElementById('country').value;
  const pw = document.getElementById('password').value;
  const cp = document.getElementById('confirm').value;
  const picFile = document.getElementById('profile-pic-input').files[0];

  if(!u||!e||!ph||!wa||!co||!pw||!cp){
    err.textContent='⚠️ Please fill all fields.';
    err.style.display='block';

  if(!/^[a-zA-Z0-9]+$/.test(u)){
    err.textContent='⚠️ Username must contain letters and numbers only. No spaces or special characters allowed.';
    err.style.display='block';
    return;
  }

  if(!e.includes('@')){
    err.textContent='⚠️ Enter a valid email.';
    err.style.display='block';
    return;
  }

  // Phone: digits only, minimum 10 digits
  const phoneDigits = ph.replace(/[\s\-\+]/g,'');
  if(!/^\d{10,}$/.test(phoneDigits)){
    err.textContent='⚠️ Phone number must be at least 10 digits.';
    err.style.display='block';
    return;
  }

  if(pw!==cp){
    err.textContent='⚠️ Passwords do not match.';
    err.style.display='block';
    return;
  }

  if(pw.length<6){
    err.textContent='⚠️ Password must be at least 6 characters.';
    err.style.display='block';
    return;
  }

  if(!isValidWhatsApp(wa)){
    err.textContent='⚠️ WhatsApp number must start with + and country code (e.g., +254712345678).';
    err.style.display='block';
    return;
  }

  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span> Checking...';

  try{
    if(await isUsernameTaken(u)){
      throw new Error('username_taken');
    }

    if(await isEmailTaken(e)){
      throw new Error('email_already_in_use');
    }

    if(await isPhoneTaken(ph)){
      throw new Error('phone_taken');
    }

    btn.innerHTML='<span class="spinner"></span> Creating...';

    const cred = await createUserWithEmailAndPassword(auth, e, pw);
    const uid = cred.user.uid;
    const refCode = u.toLowerCase().replace(/\s+/g,'').replace(/[^a-z0-9]/g,'');
    
    let profilePicURL = '';
    
    // Upload profile picture if provided
    if(picFile) {
      btn.innerHTML='<span class="spinner"></span> Uploading photo...';
      const storageRef = ref(storage, `profilePictures/${uid}`);
      await uploadBytes(storageRef, picFile);
      profilePicURL = await getDownloadURL(storageRef);
    }

    await setDoc(doc(db,'users',uid),{
      uid, 
      username:u.toLowerCase(), 
      email:e.toLowerCase(), 
      phone:ph, 
      whatsapp:wa, 
      country:co,
      profilePicture:profilePicURL,
      activated:false, 
      referralCode:refCode, 
      referredBy:refParam||'',
      balance:0, 
      totalEarnings:0, 
      withdrawn:0, 
      pending:0,
      weeklyBonus:0, 
      karibu:0, 
      level1Count:0, 
      level2Count:0, 
      level3Count:0,
      createdAt:serverTimestamp()
    });

    localStorage.setItem('nlUID', uid);
    localStorage.setItem('nlActivated', 'false');
    localStorage.removeItem('nlAdmin');
    window.location.replace('https://netlinkagencies.linkpc.net/activate');

  }catch(e2){
    btn.disabled=false;
    btn.innerHTML='🚀 Create Account';
    
    let msg = e2.message;
    if(msg === 'username_taken') msg='⚠️ Username already used, please enter different username.';
    else if(msg === 'email_already_in_use' || msg.includes('email-already-in-use')) msg='⚠️ This email is already registered. Please log in.';
    else if(msg === 'phone_taken') msg='⚠️ This phone number is already registered.';
    else if(msg.includes('invalid-email')) msg='⚠️ Invalid email address.';
    else if(msg.includes('weak-password')) msg='⚠️ Password is too weak.';
    
    err.textContent=msg;
    err.style.display='block';
  }
};
</script>
</body>
</html>
