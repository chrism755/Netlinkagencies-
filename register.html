<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Register — NETLINK AGENCIES</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--primary:#E91E63;--accent:#FF1493;--green:#00C853;--red:#FF3B3B;--bg:#E91E63;--bg3:#F5F5F5;--card:#FFFFFF;--border:#E0E0E0;--text:#1A1A1A;--text2:#666666;--white:#FFFFFF;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#E91E63,#FF1493,#E91E63);color:var(--text);min-height:100vh;}
.bg{position:fixed;inset:0;pointer-events:none;}
.bg::before{content:'';position:absolute;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(255,255,255,.1),transparent 70%);border-radius:50%;}
.bg::after{content:'';position:absolute;bottom:-200px;right:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(255,255,255,.08),transparent 70%);border-radius:50%;}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:40px 16px 60px;}
.logo{display:flex;align-items:center;gap:15px;justify-content:center;margin-bottom:20px;}
.logo-icon{width:80px;height:80px;position:relative;display:flex;align-items:center;justify-content:center;}
.netlink-logo{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
/* Outer circles */
.network-outer{position:absolute;width:100%;height:100%;border:2px solid rgba(255,20,147,.4);border-radius:50%;animation:pulse 3s ease-in-out infinite;}
.network-middle{position:absolute;width:85%;height:85%;border:1.5px solid rgba(255,20,147,.5);border-radius:50%;animation:pulse 3s ease-in-out infinite .3s;}
/* Center circle with profile picture */
.network-center{position:relative;width:50px;height:50px;background:linear-gradient(135deg,#FF1493,#E91E63);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:32px;color:#fff;overflow:hidden;cursor:pointer;transition:all .3s;}
.network-center img{width:100%;height:100%;object-fit:cover;}
.network-center.default-logo{background:linear-gradient(135deg,#FF1493,#E91E63);}
/* Nodes around the circle */
.node{position:absolute;width:12px;height:12px;background:radial-gradient(circle,#FF1493,#E91E63);border-radius:50%;box-shadow:0 0 15px rgba(255,20,147,.8);}
.node:nth-child(2){top:5%;left:50%;transform:translateX(-50%);}
.node:nth-child(3){top:13%;right:13%;transform:translate(0,0);}
.node:nth-child(4){right:5%;top:50%;transform:translateY(-50%);}
.node:nth-child(5){bottom:13%;right:13%;}
.node:nth-child(6){bottom:5%;left:50%;transform:translateX(-50%);}
.node:nth-child(7){bottom:13%;left:13%;}
.node:nth-child(8){left:5%;top:50%;transform:translateY(-50%);}
.node:nth-child(9){top:13%;left:13%;}
/* Lines connecting nodes */
svg{position:absolute;width:100%;height:100%;top:0;left:0;z-index:1;}
@keyframes pulse{0%,100%{opacity:.6;}50%{opacity:1;}}
.logo-text{font-family:'Orbitron',monospace;font-weight:900;font-size:18px;color:var(--white);line-height:1.1;}
.logo-sub{font-size:10px;color:rgba(255,255,255,.9);letter-spacing:2px;font-family:'Orbitron',monospace;}
h1{font-family:'Nunito',sans-serif;font-size:24px;font-weight:800;color:var(--white);margin-bottom:6px;text-align:center;}
.sub{color:rgba(255,255,255,.95);font-size:14px;text-align:center;margin-bottom:30px;}
.card{background:var(--card);border:none;border-radius:20px;padding:32px 24px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.stitle{display:none;}
.fg{margin-bottom:16px;}
label{display:block;font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;letter-spacing:.5px;text-transform:none;}
input,select{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:12px 15px;color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;outline:none;transition:all .3s;}
input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(233,30,99,.1);}
input::placeholder{color:var(--text2);opacity:.7;}
select option{background:var(--bg3);color:var(--text);}
.profile-pic-input{display:none;}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;background:linear-gradient(135deg,var(--primary),var(--accent));color:var(--white);transition:all .3s;box-shadow:0 8px 20px rgba(233,30,99,.3);z-index:10;position:relative;}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 25px rgba(233,30,99,.4);}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.err{background:rgba(255,59,59,.12);border:1.5px solid var(--red);color:#FF3B3B;border-radius:10px;padding:12px 15px;font-size:13px;font-weight:600;margin:10px 0;display:none;}
.link{text-align:center;margin-top:18px;font-size:13px;color:var(--text2);}
.link a{color:var(--primary);font-weight:700;text-decoration:none;}
.ref-box{background:rgba(233,30,99,.1);border:1px solid var(--primary);border-radius:8px;padding:10px;font-size:12px;color:var(--primary);margin-bottom:12px;display:none;font-weight:600;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <line x1="40" y1="40" x2="40" y2="8" stroke="rgba(255,20,147,0.3)" stroke-width="1.5"/>
        <line x1="40" y1="40" x2="63" y2="17" stroke="rgba(255,20,147,0.3)" stroke-width="1.5"/>
        <line x1="40" y1="40" x2="72" y2="40" stroke="rgba(255,20,147,0.3)" stroke-width="1.5"/>
        <line x1="40" y1="40" x2="63" y2="63" stroke="rgba(255,20,147,0.3)" stroke-width="1.5"/>
        <line x1="40" y1="40" x2="40" y2="72" stroke="rgba(255,20,147,0.3)" stroke-width="1.5"/>
        <line x1="40" y1="40" x2="17" y2="63" stroke="rgba(255,20,147,0.3)" stroke-width="1.5"/>
        <line x1="40" y1="40" x2="8" y2="40" stroke="rgba(255,20,147,0.3)" stroke-width="1.5"/>
        <line x1="40" y1="40" x2="17" y2="17" stroke="rgba(255,20,147,0.3)" stroke-width="1.5"/>
      </svg>
      <div class="netlink-logo">
        <div class="network-outer"></div>
        <div class="network-middle"></div>
        <div class="node"></div>
        <div class="node"></div>
        <div class="node"></div>
        <div class="node"></div>
        <div class="node"></div>
        <div class="node"></div>
        <div class="node"></div>
        <div class="node"></div>
        <div class="network-center default-logo" id="network-center">
          <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Cdefs%3E%3Cstyle%3E.logo-center%7Bfill:%23FF1493%7D.logo-text%7Bfill:%23fff;font-family:Orbitron,monospace;font-weight:900;font-size:28px%7D.node%7Bfill:%23FF1493;filter:drop-shadow(0 0 8px rgba(255,20,147,0.8))%7D%3C/style%3E%3C/defs%3E%3Ccircle cx='100' cy='100' r='100' fill='%231a0a2e' opacity='0.9'/%3E%3Ccircle cx='100' cy='100' r='90' fill='none' stroke='rgba(255,20,147,0.4)' stroke-width='2'/%3E%3Ccircle cx='100' cy='100' r='75' fill='none' stroke='rgba(255,20,147,0.3)' stroke-width='1.5'/%3E%3Ccircle cx='100' cy='30' r='6' class='node'/%3E%3Ccircle cx='156' cy='45' r='6' class='node'/%3E%3Ccircle cx='170' cy='100' r='6' class='node'/%3E%3Ccircle cx='156' cy='155' r='6' class='node'/%3E%3Ccircle cx='100' cy='170' r='6' class='node'/%3E%3Ccircle cx='44' cy='155' r='6' class='node'/%3E%3Ccircle cx='30' cy='100' r='6' class='node'/%3E%3Ccircle cx='44' cy='45' r='6' class='node'/%3E%3Cline x1='100' y1='100' x2='100' y2='30' stroke='rgba(255,20,147,0.3)' stroke-width='1'/%3E%3Cline x1='100' y1='100' x2='156' y2='45' stroke='rgba(255,20,147,0.3)' stroke-width='1'/%3E%3Cline x1='100' y1='100' x2='170' y2='100' stroke='rgba(255,20,147,0.3)' stroke-width='1'/%3E%3Cline x1='100' y1='100' x2='156' y2='155' stroke='rgba(255,20,147,0.3)' stroke-width='1'/%3E%3Cline x1='100' y1='100' x2='100' y2='170' stroke='rgba(255,20,147,0.3)' stroke-width='1'/%3E%3Cline x1='100' y1='100' x2='44' y2='155' stroke='rgba(255,20,147,0.3)' stroke-width='1'/%3E%3Cline x1='100' y1='100' x2='30' y2='100' stroke='rgba(255,20,147,0.3)' stroke-width='1'/%3E%3Cline x1='100' y1='100' x2='44' y2='45' stroke='rgba(255,20,147,0.3)' stroke-width='1'/%3E%3Ccircle cx='100' cy='100' r='35' class='logo-center'/%3E%3Ctext x='100' y='115' text-anchor='middle' class='logo-text'%3EN%3C/text%3E%3C/svg%3E" alt="NETLINK Logo"/>
        </div>
      </div>
    </div>
    <div><div class="logo-text">NETLINK</div><div class="logo-sub">AGENCIES</div></div>
  </div>
  <h1>Create Account</h1>
  <p class="sub">Linking You to Financial Solutions</p>
  <div class="card">
    <div class="ref-box" id="ref-box">🔗 Referred by: <strong id="ref-by"></strong></div>
    <div class="fg"><label>Username</label><input id="username" type="text" placeholder="Enter username"/></div>
    <div class="fg"><label>Email Address</label><input id="email" type="email" placeholder="e.g. john@gmail.com"/></div>
    <div class="fg"><label>Phone Number</label><input id="phone" type="tel" placeholder="e.g. 0712345678"/></div>
    <div class="fg"><label>WhatsApp Number</label><input id="whatsapp" type="tel" placeholder="+254712345678"/></div>
    <div class="fg"><label>Country</label>
      <select id="country">
        <option value="">Select your country</option>
        <option>Kenya</option><option>Uganda</option><option>Tanzania</option>
        <option>Rwanda</option><option>Nigeria</option><option>Ghana</option>
        <option>South Africa</option><option>United States</option>
        <option>United Kingdom</option><option>Other</option>
      </select>
    </div>
    <div class="fg"><label>Password</label><input id="password" type="password" placeholder="Enter password"/></div>
    <div class="fg"><label>Confirm Password</label><input id="confirm" type="password" placeholder="Repeat password"/></div>
    <div class="err" id="err"></div>
    <button class="btn" id="btn" onclick="doRegister()">🚀 Create Account</button>
    <div class="link">Already have an account? <a href="/login">Log In</a></div>
  </div>
</div>
<input type="file" id="profile-pic-input" class="profile-pic-input" accept="image/*"/>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, collection, query, where, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const app = initializeApp({
  apiKey:"AIzaSyCCFExYKkXxauIXVv2HzNHbNnizL6MF_p4",
  authDomain:"netlink-agencies-6399e.firebaseapp.com",
  projectId:"netlink-agencies-6399e",
  storageBucket:"netlink-agencies-6399e.firebasestorage.app",
  messagingSenderId:"546397751362",
  appId:"1:546397751362:web:c74e057b2b0ceb6c0745db"
});
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

const refParam = new URLSearchParams(window.location.search).get('ref');
if(refParam){
  document.getElementById('ref-box').style.display='block';
  document.getElementById('ref-by').textContent=refParam;
}

// Profile picture upload on logo click
const networkCenter = document.getElementById('network-center');
const profilePicInput = document.getElementById('profile-pic-input');

networkCenter.addEventListener('click', () => {
  profilePicInput.click();
});

profilePicInput.addEventListener('change', function(e) {
  const file = e.target.files[0];
  if(file) {
    const reader = new FileReader();
    reader.onload = function(event) {
      const img = networkCenter.querySelector('img');
      if(img) {
        img.src = event.target.result;
      }
      networkCenter.classList.remove('default-logo');
    };
    reader.readAsDataURL(file);
  }
});

function isValidWhatsApp(number) {
  const cleaned = number.replace(/[\s\-\+]/g, '');
  return /^\d{10,15}$/.test(cleaned);
}

async function isUsernameTaken(username) {
  try {
    const q = query(collection(db, 'users'), where('username', '==', username.toLowerCase()));
    const snapshot = await getDocs(q);
    return !snapshot.empty;
  } catch (e) {
    return false;
  }
}

async function isEmailTaken(email) {
  try {
    const q = query(collection(db, 'users'), where('email', '==', email.toLowerCase()));
    const snapshot = await getDocs(q);
    return !snapshot.empty;
  } catch (e) {
    return false;
  }
}

async function isPhoneTaken(phone) {
  try {
    const q = query(collection(db, 'users'), where('phone', '==', phone));
    const snapshot = await getDocs(q);
    return !snapshot.empty;
  } catch (e) {
    return false;
  }
}

window.doRegister = async function(){
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  err.style.display='none';

  const u = document.getElementById('username').value.trim();
  const e = document.getElementById('email').value.trim();
  const ph = document.getElementById('phone').value.trim();
  const wa = document.getElementById('whatsapp').value.trim();
  const co = document.getElementById('country').value;
  const pw = document.getElementById('password').value;
  const cp = document.getElementById('confirm').value;
  const picFile = document.getElementById('profile-pic-input').files[0];

  if(!u||!e||!ph||!wa||!co||!pw||!cp){
    err.textContent='⚠️ Please fill all fields.';
    err.style.display='block';
    return;
  }

  if(!e.includes('@')){
    err.textContent='⚠️ Enter a valid email.';
    err.style.display='block';
    return;
  }

  if(pw!==cp){
    err.textContent='⚠️ Passwords do not match.';
    err.style.display='block';
    return;
  }

  if(pw.length<6){
    err.textContent='⚠️ Password must be at least 6 characters.';
    err.style.display='block';
    return;
  }

  if(!isValidWhatsApp(wa)){
    err.textContent='⚠️ WhatsApp number must start with country code (e.g., +254712345678).';
    err.style.display='block';
    return;
  }

  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span> Checking...';

  try{
    if(await isUsernameTaken(u)){
      throw new Error('username_taken');
    }

    if(await isEmailTaken(e)){
      throw new Error('email_already_in_use');
    }

    if(await isPhoneTaken(ph)){
      throw new Error('phone_taken');
    }

    btn.innerHTML='<span class="spinner"></span> Creating...';

    const cred = await createUserWithEmailAndPassword(auth, e, pw);
    const uid = cred.user.uid;
    const refCode = u.toLowerCase().replace(/\s+/g,'').replace(/[^a-z0-9]/g,'');
    
    let profilePicURL = '';
    
    // Upload profile picture if provided
    if(picFile) {
      btn.innerHTML='<span class="spinner"></span> Uploading photo...';
      const storageRef = ref(storage, `profilePictures/${uid}`);
      await uploadBytes(storageRef, picFile);
      profilePicURL = await getDownloadURL(storageRef);
    }

    await setDoc(doc(db,'users',uid),{
      uid, 
      username:u.toLowerCase(), 
      email:e.toLowerCase(), 
      phone:ph, 
      whatsapp:wa, 
      country:co,
      profilePicture:profilePicURL,
      activated:false, 
      referralCode:refCode, 
      referredBy:refParam||'',
      balance:0, 
      totalEarnings:0, 
      withdrawn:0, 
      pending:0,
      weeklyBonus:0, 
      karibu:0, 
      level1Count:0, 
      level2Count:0, 
      level3Count:0,
      createdAt:serverTimestamp()
    });

    localStorage.setItem('nlUID', uid);
    localStorage.setItem('nlActivated', 'false');
    localStorage.removeItem('nlAdmin');
    window.location.replace('https://netlinkagencies.linkpc.net/activate');

  }catch(e2){
    btn.disabled=false;
    btn.innerHTML='🚀 Create Account';
    
    let msg = e2.message;
    if(msg === 'username_taken') msg='⚠️ Username already used, please enter different username.';
    else if(msg === 'email_already_in_use' || msg.includes('email-already-in-use')) msg='⚠️ This email is already registered. Please log in.';
    else if(msg === 'phone_taken') msg='⚠️ This phone number is already registered.';
    else if(msg.includes('invalid-email')) msg='⚠️ Invalid email address.';
    else if(msg.includes('weak-password')) msg='⚠️ Password is too weak.';
    
    err.textContent=msg;
    err.style.display='block';
  }
};
</script>
</body>
</html>
