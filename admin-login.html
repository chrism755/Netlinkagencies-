<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login – NETLINK AGENCIES</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page-header">
  <div class="logo-wrap">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M17 8c-5 0-9 4-9 9s4 9 9 9h2v-3h-2c-3.3 0-6-2.7-6-6s2.7-6 6-6h2V8h-2z" fill="white"/>
      <path d="M23 8v3h2c3.3 0 6 2.7 6 6s-2.7 6-6 6h-2v3h2c5 0 9-4 9-9s-4-9-9-9h-2z" fill="white"/>
      <rect x="13" y="18" width="14" height="3" rx="1.5" fill="white"/>
    </svg>
  </div>
  <div class="brand-name">NETLINK AGENCIES</div>
  <div class="brand-sub">Admin Portal</div>
</div>

<div class="card">
  <h2>Admin Login</h2>
  <p class="subtitle">Restricted access — authorized personnel only</p>
  <div id="msg" class="alert alert-error hidden"></div>
  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="admin" value="admin">
  </div>
  <div class="form-group">
    <div class="pw-label-row"><label>Password</label></div>
    <input type="password" id="password" placeholder="••••••••">
  </div>
  <button class="btn-primary" id="loginBtn" onclick="adminLogin()">Login to Admin Panel</button>
  <div class="link-row"><a href="login.html">← Back to User Login</a></div>
</div>

<script type="module">
  import { auth, db } from "./firebase-config.js";
  import { signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const ADMIN_EMAIL = "admin@netlinkagencies.com";
  const ADMIN_PASSWORD = "Netlink2026";

  function showMsg(text, type = "error") {
    const el = document.getElementById("msg");
    el.className = "alert alert-" + type;
    el.textContent = text;
    el.classList.remove("hidden");
  }

  window.adminLogin = async function() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    if (username !== "admin" || password !== ADMIN_PASSWORD) {
      return showMsg("Invalid admin credentials.");
    }

    const btn = document.getElementById("loginBtn");
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span> Logging in...';

    try {
      let cred;
      try {
        cred = await signInWithEmailAndPassword(auth, ADMIN_EMAIL, ADMIN_PASSWORD);
      } catch (e) {
        if (e.code === "auth/user-not-found" || e.code === "auth/invalid-credential") {
          cred = await createUserWithEmailAndPassword(auth, ADMIN_EMAIL, ADMIN_PASSWORD);
          await setDoc(doc(db, "users", cred.user.uid), {
            username: "admin", displayName: "Admin", email: ADMIN_EMAIL,
            isActive: true, isAdmin: true, accountBalance: 0, totalEarnings: 0,
            withdrawnAmount: 0, pendingAmount: 0
          });
        } else throw e;
      }

      const userDoc = await getDoc(doc(db, "users", cred.user.uid));
      if (!userDoc.exists() || !userDoc.data().isAdmin) {
        await setDoc(doc(db, "users", cred.user.uid), { isAdmin: true }, { merge: true });
      }

      window.location.href = "admin.html";
    } catch (e) {
      btn.disabled = false;
      btn.textContent = "Login to Admin Panel";
      showMsg("Login failed: " + e.message);
    }
  };

  document.addEventListener("keydown", e => { if (e.key === "Enter") window.adminLogin(); });
</script>
</body>
</html>
