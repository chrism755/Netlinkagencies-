<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Manage Users — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--primary:#0057FF;--accent:#00D4FF;--green:#00C853;--red:#FF3B3B;--yellow:#FFB300;--purple:#7C3AED;--bg:#050D1A;--bg2:#0A1628;--bg3:#0F1F3D;--card:#111E35;--border:#1E3560;--text:#E8F0FF;--text2:#8BA4CC;--white:#FFFFFF;--sw:250px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.layout{display:flex;min-height:100vh;}
.sidebar{width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;z-index:100;transform:translateX(-100%);transition:.3s;display:flex;flex-direction:column;}
.sidebar.open{transform:translateX(0);}
.sb-head{padding:16px;border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:9px;}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.logo-text{font-family:'Orbitron',monospace;font-weight:900;font-size:11px;color:var(--white);line-height:1.1;}
.logo-sub{font-size:8px;color:var(--accent);letter-spacing:2px;font-family:'Orbitron',monospace;}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0;}
.ni{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);border-left:3px solid transparent;text-decoration:none;transition:.15s;}
.ni:hover,.ni.active{background:rgba(0,87,255,.1);color:var(--accent);border-left-color:var(--primary);}
.ni-icon{font-size:15px;width:20px;text-align:center;}
.main{flex:1;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:13px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
.menu-btn{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;}
.tb-title{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--white);flex:1;}
.avatar{width:32px;height:32px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;}
.content{padding:16px 14px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;display:none;}
.overlay.show{display:block;}
.search{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;outline:none;margin-bottom:14px;}
.search:focus{border-color:var(--primary);}
.uc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;}
.un{font-size:15px;font-weight:800;color:var(--white);margin-bottom:4px;}
.ue{font-size:12px;color:var(--text2);margin-bottom:8px;}
.urow{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.ul{font-size:12px;color:var(--text2);font-weight:700;}
.uv{font-size:13px;color:var(--white);font-weight:700;}
.sa{background:rgba(0,200,83,.15);color:var(--green);padding:2px 9px;border-radius:20px;font-size:10px;font-weight:800;}
.si{background:rgba(255,59,59,.15);color:var(--red);padding:2px 9px;border-radius:20px;font-size:10px;font-weight:800;}
.btns{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px;}
.ab{padding:7px 14px;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;}
.ab.act{background:var(--green);color:#fff;}
.ab.dea{background:var(--red);color:#fff;}
.ab.wa{background:#25D366;color:#fff;}
.ab.edit{background:var(--primary);color:#fff;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:center;justify-content:center;padding:16px;}
.modal.show{display:flex;}
.mcard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:400px;}
.mcard h3{font-family:'Orbitron',monospace;font-size:14px;color:var(--accent);margin-bottom:16px;}
.fg{margin-bottom:12px;}
label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;text-transform:uppercase;}
input{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;padding:10px 13px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;outline:none;}
input:focus{border-color:var(--primary);}
.btn{width:100%;padding:11px;border:none;border-radius:9px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;margin-top:4px;}
.cbtn{width:100%;padding:11px;border:1.5px solid var(--border);border-radius:9px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;background:transparent;color:var(--text2);margin-top:6px;}
.ok{background:rgba(0,200,83,.12);border:1.5px solid var(--green);color:#69F0AE;border-radius:9px;padding:11px;font-size:13px;margin:10px 0;display:none;}
.loader{position:fixed;inset:0;background:rgba(5,13,26,.95);z-index:9999;display:none;align-items:center;justify-content:center;}
.loader.show{display:flex;}
.ring{width:50px;height:50px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="ring"></div></div>
<div class="overlay" id="ov" onclick="closeSB()"></div>
<div class="modal" id="modal">
  <div class="mcard">
    <h3 id="modal-title">Edit User</h3>
    <div class="fg"><label>Balance (KES)</label><input id="m-balance" type="number"/></div>
    <div class="fg"><label>Total Earnings (KES)</label><input id="m-earnings" type="number"/></div>
    <div class="fg"><label>New Password (leave blank to skip)</label><input id="m-pw" type="password" placeholder="New password"/></div>
    <div class="ok" id="m-ok">✅ User updated!</div>
    <button class="btn" onclick="saveEdit()">💾 Save Changes</button>
    <button class="cbtn" onclick="closeModal()">Cancel</button>
  </div>
</div>
<div class="layout">
  <nav class="sidebar" id="sb">
    <div class="sb-head"><div class="logo"><div class="logo-icon">🔗</div><div><div class="logo-text">NETLINK</div><div class="logo-sub">ADMIN</div></div></div></div>
    <div class="sb-nav">
      <a class="ni" href="/admin/panel.html"><span class="ni-icon">🏠</span>Dashboard</a>
      <a class="ni active" href="/admin/users.html"><span class="ni-icon">👥</span>Manage Users</a>
      <a class="ni" href="/admin/activation.html"><span class="ni-icon">✅</span>Activation</a>
      <a class="ni" href="/admin/withdraw.html"><span class="ni-icon">💸</span>Withdrawals</a>
      <a class="ni" href="/admin/deposits.html"><span class="ni-icon">💰</span>Deposits</a>
      <a class="ni" href="/admin/community.html"><span class="ni-icon">📝</span>Community Posts</a>
      <a class="ni" href="/admin/settings.html"><span class="ni-icon">⚙️</span>Settings</a>
      <a class="ni" style="color:var(--red);" onclick="logout()"><span class="ni-icon">🚪</span>Log Out</a>
    </div>
  </nav>
  <div class="main">
    <div class="topbar">
      <button class="menu-btn" onclick="openSB()">☰</button>
      <div class="tb-title">Manage Users</div>
      <div style="display:flex;align-items:center;gap:8px;"><div class="avatar">A</div><span style="font-size:12px;font-weight:700;">Admin</span></div>
    </div>
    <div class="content">
      <input class="search" id="search" placeholder="🔍 Search users..." oninput="filterUsers()"/>
      <div id="users-list"><div style="text-align:center;padding:40px;color:var(--text2);">Loading users...</div></div>
    </div>
  </div>
</div>
<script type="module">
if(!localStorage.getItem('nlAdmin')){window.location.href='/admin/index.html';}
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyCCFExYKkXxauIXVv2HzNHbNnizL6MF_p4",authDomain:"netlink-agencies-6399e.firebaseapp.com",projectId:"netlink-agencies-6399e",storageBucket:"netlink-agencies-6399e.firebasestorage.app",messagingSenderId:"546397751362",appId:"1:546397751362:web:c74e057b2b0ceb6c0745db"});
const db=getFirestore(app);
let allUsers=[];let editDocId=null;
document.getElementById('loader').classList.add('show');
async function loadUsers(){
  const snap=await getDocs(collection(db,'users'));
  allUsers=snap.docs.map(d=>({id:d.id,...d.data()}));
  document.getElementById('loader').classList.remove('show');
  renderUsers(allUsers);
}
function renderUsers(users){
  const list=document.getElementById('users-list');
  if(users.length===0){list.innerHTML='<div style="text-align:center;padding:40px;color:var(--text2);">No users found.</div>';return;}
  list.innerHTML=users.map(u=>`
    <div class="uc">
      <div class="un">${u.username||''} <span class="${u.activated?'sa':'si'}">${u.activated?'✅ Active':'❌ Inactive'}</span></div>
      <div class="ue">${u.email||''}</div>
      <div class="urow"><div class="ul">Phone</div><div class="uv">${u.phone||'—'}</div></div>
      <div class="urow"><div class="ul">WhatsApp</div><div class="uv">${u.whatsapp||'—'}</div></div>
      <div class="urow"><div class="ul">Country</div><div class="uv">${u.country||'—'}</div></div>
      <div class="urow"><div class="ul">Balance</div><div class="uv" style="color:#FFD700;">KES ${u.balance||0}</div></div>
      <div class="urow"><div class="ul">Total Earnings</div><div class="uv" style="color:#00C853;">KES ${u.totalEarnings||0}</div></div>
      <div class="urow"><div class="ul">Referral Code</div><div class="uv" style="color:var(--accent);">${u.referralCode||'—'}</div></div>
      <div class="btns">
        ${!u.activated?`<button class="ab act" onclick="setActive('${u.id}',true)">✅ Activate</button>`:`<button class="ab dea" onclick="setActive('${u.id}',false)">❌ Deactivate</button>`}
        <button class="ab edit" onclick="openEdit('${u.id}',${u.balance||0},${u.totalEarnings||0},'${u.username||''}')">✏️ Edit</button>
        <button class="ab wa" onclick="window.open('https://wa.me/${(u.whatsapp||'').replace(/[^0-9]/g,'')}','_blank')">💬 WhatsApp</button>
      </div>
    </div>`).join('');
}
window.filterUsers=function(){
  const q=document.getElementById('search').value.toLowerCase();
  renderUsers(allUsers.filter(u=>(u.username||'').toLowerCase().includes(q)||(u.email||'').toLowerCase().includes(q)||(u.phone||'').includes(q)));
};
window.setActive=async function(id,val){
  await updateDoc(doc(db,'users',id),{activated:val});
  allUsers=allUsers.map(u=>u.id===id?{...u,activated:val}:u);
  renderUsers(allUsers);
};
window.openEdit=function(id,balance,earnings,name){
  editDocId=id;
  document.getElementById('modal-title').textContent='Edit: '+name;
  document.getElementById('m-balance').value=balance;
  document.getElementById('m-earnings').value=earnings;
  document.getElementById('m-pw').value='';
  document.getElementById('m-ok').style.display='none';
  document.getElementById('modal').classList.add('show');
};
window.closeModal=()=>document.getElementById('modal').classList.remove('show');
window.saveEdit=async function(){
  const balance=parseInt(document.getElementById('m-balance').value)||0;
  const earnings=parseInt(document.getElementById('m-earnings').value)||0;
  await updateDoc(doc(db,'users',editDocId),{balance,totalEarnings:earnings});
  allUsers=allUsers.map(u=>u.id===editDocId?{...u,balance,totalEarnings:earnings}:u);
  document.getElementById('m-ok').style.display='block';
  setTimeout(()=>{closeModal();renderUsers(allUsers);},1200);
};
window.openSB=()=>{document.getElementById('sb').classList.add('open');document.getElementById('ov').classList.add('show');};
window.closeSB=()=>{document.getElementById('sb').classList.remove('open');document.getElementById('ov').classList.remove('show');};
window.logout=()=>{localStorage.removeItem('nlAdmin');window.location.href='/admin/index.html';};
loadUsers();
</script>
</body>
</html>
