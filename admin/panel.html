<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Dashboard — NETLINK AGENCIES</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--pk:#E91E8C;--pk2:#FF4DB8;--pkd:#B0156A;--bg:#1a0010;--bg2:#2a0018;--bg3:#3d0024;--card:#2d0019;--border:#6b0040;--green:#00E676;--red:#FF5252;--yellow:#FFD740;--gold:#FFD700;--white:#FFFFFF;--sw:250px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:#fff;min-height:100vh;}
.layout{display:flex;min-height:100vh;}
.sidebar{width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;z-index:100;transform:translateX(-100%);transition:.3s;display:flex;flex-direction:column;}
.sidebar.open{transform:translateX(0);}
.sb-head{padding:16px;border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:9px;}
.logo-icon{width:34px;height:34px;background:rgba(255,255,255,.2);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.logo-text{font-weight:900;font-size:11px;color:#fff;line-height:1.1;}
.logo-sub{font-size:8px;color:rgba(255,255,255,.8);letter-spacing:2px;}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0;}
.ni{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:13px;font-weight:600;color:#fff;border-left:3px solid transparent;text-decoration:none;transition:.15s;}
.ni:hover,.ni.active{background:rgba(233,30,140,.15);color:#fff;border-left-color:var(--pk);}
.ni-icon{font-size:15px;width:20px;text-align:center;}
.main{flex:1;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:13px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
.menu-btn{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;}
.tb-title{font-size:14px;font-weight:800;color:#fff;flex:1;}
.avatar{width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;}
.content{padding:16px 14px;max-width:780px;margin:0 auto;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;display:none;}
.overlay.show{display:block;}
.stat{border-radius:14px;padding:16px;margin-bottom:10px;}
.sg{background:rgba(0,230,118,.08);border:1.5px solid var(--green);}
.sp{background:rgba(233,30,140,.08);border:1.5px solid var(--pk);}
.sr{background:rgba(255,82,82,.08);border:1.5px solid var(--red);}
.sy{background:rgba(255,215,0,.08);border:1.5px solid var(--yellow);}
.sb{background:rgba(233,30,140,.08);border:1.5px solid var(--pk);}
.sm{background:linear-gradient(135deg,rgba(233,30,140,.06),rgba(255,77,184,.06));border:1.5px solid rgba(255,215,0,.3);}
.stat-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;opacity:.8;margin-bottom:5px;}
.stat-value{font-size:26px;font-weight:900;color:#fff;}
.loader{position:fixed;inset:0;background:rgba(26,0,16,.95);z-index:9999;display:none;align-items:center;justify-content:center;}
.loader.show{display:flex;}
.ring{width:50px;height:50px;border:4px solid var(--border);border-top-color:var(--pk);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="ring"></div></div>
<div class="overlay" id="ov" onclick="closeSB()"></div>
<div class="layout">
  <nav class="sidebar" id="sb">
    <div class="sb-head"><div class="logo"><div class="logo-icon">🔗</div><div><div class="logo-text">NETLINK</div><div class="logo-sub">ADMIN</div></div></div></div>
    <div class="sb-nav">
      <a class="ni active" href="/admin/panel.html"><span class="ni-icon">🏠</span>Dashboard</a>
      <a class="ni" href="/admin/users.html"><span class="ni-icon">👥</span>Manage Users</a>
      <a class="ni" href="/admin/activation.html"><span class="ni-icon">✅</span>Activation</a>
      <a class="ni" href="/admin/withdraw.html"><span class="ni-icon">💸</span>Withdrawals</a>
      <a class="ni" href="/admin/deposits.html"><span class="ni-icon">💰</span>Deposits</a>
      <a class="ni" href="/admin/community.html"><span class="ni-icon">📝</span>Community Posts</a>
      <a class="ni" href="/admin/settings.html"><span class="ni-icon">⚙️</span>Settings</a>
      <a class="ni" style="color:var(--red);" onclick="logout()"><span class="ni-icon">🚪</span>Log Out</a>
    </div>
  </nav>
  <div class="main">
    <div class="topbar">
      <button class="menu-btn" onclick="openSB()">☰</button>
      <div class="tb-title">Admin Dashboard</div>
      <div style="display:flex;align-items:center;gap:8px;"><div class="avatar">A</div><span style="font-size:12px;font-weight:700;">Admin</span></div>
    </div>
    <div class="content" id="content"><div style="text-align:center;padding:40px;color:var(--text2);">Loading stats...</div></div>
  </div>
</div>
<script type="module">
if(!localStorage.getItem('nlAdmin')){window.location.href='/admin/index.html';}
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyCCFExYKkXxauIXVv2HzNHbNnizL6MF_p4",authDomain:"netlink-agencies-6399e.firebaseapp.com",projectId:"netlink-agencies-6399e",storageBucket:"netlink-agencies-6399e.firebasestorage.app",messagingSenderId:"546397751362",appId:"1:546397751362:web:c74e057b2b0ceb6c0745db"});
const db=getFirestore(app);

// ── PERMISSION GUARD ────────────────────────────────────────
async function guardPage(permKey){
  const raw=localStorage.getItem('nlAdmin');
  if(!raw){window.location.href='/admin/index.html';return;}
  // Panel is accessible to ALL admins — master and co-admins
  return;
}
function showRestricted(){
  document.body.innerHTML='<div style="min-height:100vh;background:#050D1A;display:flex;align-items:center;justify-content:center;font-family:Nunito,sans-serif;padding:20px;"><div style="background:#111E35;border:1px solid #1E3560;border-radius:20px;padding:40px 30px;text-align:center;max-width:400px;width:100%;"><div style="font-size:60px;margin-bottom:16px;">🔒</div><h2 style="color:#FF3B3B;font-size:20px;font-weight:900;margin-bottom:10px;">Access Restricted</h2><p style="color:#8BA4CC;font-size:14px;line-height:1.7;margin-bottom:24px;">You are restricted to use this action.<br>Contact the master admin to get permission.</p><button onclick="window.location.href=\x27/admin/panel.html\x27" style="background:linear-gradient(135deg,#0057FF,#00D4FF);color:#fff;border:none;border-radius:10px;padding:13px 30px;font-size:14px;font-weight:800;cursor:pointer;font-family:Nunito,sans-serif;width:100%;">← Go Back to Panel</button></div></div>';}
// ───────────────────────────────────────────────────────────
guardPage('viewPayments');

document.getElementById('loader').classList.add('show');
async function load(){
  const usersSnap=await getDocs(collection(db,'users'));
  const all=usersSnap.docs.map(d=>d.data());
  const active=all.filter(u=>u.activated).length;
  const inactive=all.filter(u=>!u.activated).length;
  const actSnap=await getDocs(query(collection(db,'pendingActivations'),where('status','==','pending')));
  const wSnap=await getDocs(query(collection(db,'pendingWithdrawals'),where('status','==','pending')));
  const dSnap=await getDocs(query(collection(db,'pendingDeposits'),where('status','==','pending')));
  const approvedW=await getDocs(query(collection(db,'pendingWithdrawals'),where('status','==','approved')));
  let totalPaid=0;approvedW.docs.forEach(d=>totalPaid+=d.data().amount||0);
  document.getElementById('loader').classList.remove('show');
  document.getElementById('content').innerHTML=`
    <div class="stat sg"><div class="stat-label" style="color:#69F0AE;">Total Users</div><div class="stat-value">${all.length}</div></div>
    <div class="stat sp"><div class="stat-label" style="color:#C084FC;">Active Users</div><div class="stat-value">${active}</div></div>
    <div class="stat sr"><div class="stat-label" style="color:#FF8A80;">Inactive Users</div><div class="stat-value">${inactive}</div></div>
    <div class="stat sy"><div class="stat-label" style="color:#FFD740;">Pending Activations</div><div class="stat-value">${actSnap.size}</div></div>
    <div class="stat sb"><div class="stat-label" style="color:var(--accent);">Pending Withdrawals</div><div class="stat-value">${wSnap.size}</div></div>
    <div class="stat sb"><div class="stat-label" style="color:var(--accent);">Pending Deposits</div><div class="stat-value">${dSnap.size}</div></div>
    <div class="stat sm"><div class="stat-label" style="color:var(--gold);">Total Paid Out</div><div class="stat-value" style="color:var(--gold);">KES ${totalPaid}</div></div>`;
}
load();

window.showMsg=function(msg,type){
  let area=document.getElementById('msg-area');
  if(!area){area=document.createElement('div');area.id='msg-area';document.querySelector('.content').prepend(area);}
  area.innerHTML='<div style="background:'+(type==='ok'?'rgba(0,230,118,.1)':'rgba(255,82,82,.1)')+';border:1.5px solid '+(type==='ok'?'#00E676':'#FF5252')+';color:'+(type==='ok'?'#69F0AE':'#FF8A80')+';border-radius:12px;padding:14px;font-size:13px;margin-bottom:14px;font-family:Nunito,sans-serif;font-weight:600;">'+msg+'</div>';
  setTimeout(()=>{if(area)area.innerHTML='';},5000);
};
window.openSB=()=>{document.getElementById('sb').classList.add('open');document.getElementById('ov').classList.add('show');};
window.closeSB=()=>{document.getElementById('sb').classList.remove('open');document.getElementById('ov').classList.remove('show');};
window.logout=()=>{localStorage.removeItem('nlAdmin');window.location.href='/admin/index.html';};
</script>
</body>
</html>
