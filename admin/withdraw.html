<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Withdrawals — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--pk:#E91E8C;--pk2:#FF4DB8;--pkd:#B0156A;--bg:#1a0010;--bg2:#2a0018;--bg3:#3d0024;--card:#2d0019;--border:#6b0040;--green:#00E676;--red:#FF5252;--yellow:#FFD740;--gold:#FFD700;--sw:250px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:#fff;min-height:100vh;}
.layout{display:flex;min-height:100vh;}
.sidebar{width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;z-index:100;transform:translateX(-100%);transition:.3s;display:flex;flex-direction:column;}
.sidebar.open{transform:translateX(0);}
.sb-head{padding:16px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,var(--pkd),var(--pk));}
.logo{display:flex;align-items:center;gap:9px;}
.logo-icon{width:34px;height:34px;background:rgba(255,255,255,.2);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.logo-text{font-weight:900;font-size:11px;color:#fff;line-height:1.1;}
.logo-sub{font-size:8px;color:rgba(255,255,255,.8);letter-spacing:2px;}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0;}
.ni{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;font-weight:600;color:#fff;border-left:3px solid transparent;text-decoration:none;transition:.15s;}
.ni:hover,.ni.active{background:rgba(233,30,140,.15);color:#fff;border-left-color:var(--pk);}
.ni-icon{font-size:15px;width:20px;text-align:center;}
.main{flex:1;}
.topbar{background:linear-gradient(135deg,var(--pkd),var(--pk));padding:13px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
.menu-btn{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;}
.tb-title{font-size:13px;font-weight:800;color:#fff;flex:1;}
.avatar{width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;}
.content{padding:16px 14px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;display:none;}
.overlay.show{display:block;}
.tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.tab{padding:8px 16px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;color:#fff;transition:.2s;}
.tab.active{border-color:var(--pk);background:rgba(233,30,140,.15);}
.stat-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;flex:1;min-width:100px;text-align:center;}
.stat-num{font-size:24px;font-weight:900;color:var(--gold);}
.stat-lbl{font-size:11px;color:#fff;opacity:.7;margin-top:4px;}
.rc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;}
.rn{font-size:15px;font-weight:800;color:#fff;margin-bottom:8px;}
.rrow{display:flex;justify-content:space-between;margin-bottom:6px;align-items:center;}
.rl{font-size:12px;color:#fff;font-weight:600;opacity:.7;}
.rv{font-size:13px;color:#fff;font-weight:700;}
.pending-badge{background:rgba(255,215,0,.15);border:1px solid var(--yellow);color:var(--yellow);padding:2px 9px;border-radius:20px;font-size:10px;font-weight:800;}
.approved-badge{background:rgba(0,230,118,.15);border:1px solid var(--green);color:var(--green);padding:2px 9px;border-radius:20px;font-size:10px;font-weight:800;}
.rejected-badge{background:rgba(255,82,82,.15);border:1px solid var(--red);color:var(--red);padding:2px 9px;border-radius:20px;font-size:10px;font-weight:800;}
.btns{display:flex;gap:7px;margin-top:10px;}
.ab{padding:10px 0;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;flex:1;}
.ap{background:var(--green);color:#fff;}
.rj{background:var(--red);color:#fff;}
.loader{position:fixed;inset:0;background:rgba(5,13,26,.95);z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.loader.show{display:flex;}
.ring{width:50px;height:50px;border:4px solid var(--border);border-top-color:var(--pk);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-text{color:var(--pk2);font-size:13px;font-weight:700;}
.empty{text-align:center;padding:40px;color:#fff;opacity:.6;}
.amount-big{font-size:18px;font-weight:900;color:var(--gold);}
.msg-ok{background:rgba(0,230,118,.1);border:1.5px solid var(--green);color:#69F0AE;border-radius:12px;padding:14px;font-size:13px;margin-bottom:14px;font-weight:600;}
.msg-err{background:rgba(255,82,82,.1);border:1.5px solid var(--red);color:#FF8A80;border-radius:12px;padding:14px;font-size:13px;margin-bottom:14px;font-weight:600;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="ring"></div><div class="loader-text">Processing...</div></div>
<div class="overlay" id="ov" onclick="closeSB()"></div>
<div class="layout">
  <nav class="sidebar" id="sb">
    <div class="sb-head"><div class="logo"><div class="logo-icon">🔗</div><div><div class="logo-text">NETLINK</div><div class="logo-sub">ADMIN</div></div></div></div>
    <div class="sb-nav">
      <a class="ni" href="/admin/panel.html"><span class="ni-icon">🏠</span>Dashboard</a>
      <a class="ni" href="/admin/users.html"><span class="ni-icon">👥</span>Manage Users</a>
      <a class="ni" href="/admin/activation.html"><span class="ni-icon">✅</span>Activation</a>
      <a class="ni active" href="/admin/withdraw.html"><span class="ni-icon">💸</span>Withdrawals</a>
      <a class="ni" href="/admin/deposits.html"><span class="ni-icon">💰</span>Deposits</a>
      <a class="ni" href="/admin/client-payments.html"><span class="ni-icon">🧾</span>Client Payments</a>
      <a class="ni" href="/admin/community.html"><span class="ni-icon">📝</span>Community Posts</a>
      <a class="ni" href="/admin/settings.html"><span class="ni-icon">⚙️</span>Settings</a>
      <a class="ni" href="/admin/api-key.html" id="apikey-nav-link" style="display:none;"><span class="ni-icon">🔑</span>API Keys</a>
      <a class="ni" style="color:var(--red);" onclick="logout()"><span class="ni-icon">🚪</span>Log Out</a>
    </div>
  </nav>
  <div class="main">
    <div class="topbar">
      <button class="menu-btn" onclick="openSB()">☰</button>
      <div class="tb-title">Withdrawals</div>
      <div class="avatar">A</div>
    </div>
    <div class="content">
      <div class="stat-row">
        <div class="stat-box"><div class="stat-num" id="s-pending">0</div><div class="stat-lbl">Pending</div></div>
        <div class="stat-box"><div class="stat-num" id="s-approved">0</div><div class="stat-lbl">Approved</div></div>
        <div class="stat-box"><div class="stat-num" id="s-total" style="color:var(--green);">KES 0</div><div class="stat-lbl">Total Paid</div></div>
      </div>
      <div class="tabs">
        <div class="tab active" onclick="filterTab('pending',this)">⏳ Pending</div>
        <div class="tab" onclick="filterTab('approved',this)">✅ Approved</div>
        <div class="tab" onclick="filterTab('rejected',this)">❌ Rejected</div>
      </div>
      <div id="msg-area"></div>
      <div id="list"><div class="empty">Loading...</div></div>
    </div>
  </div>
</div>
<script type="module">
if(!localStorage.getItem('nlAdmin')){window.location.href='/admin/index.html';}
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyCCFExYKkXxauIXVv2HzNHbNnizL6MF_p4",authDomain:"netlink-agencies-6399e.firebaseapp.com",projectId:"netlink-agencies-6399e",storageBucket:"netlink-agencies-6399e.firebasestorage.app",messagingSenderId:"546397751362",appId:"1:546397751362:web:c74e057b2b0ceb6c0745db"});
const db=getFirestore(app);

// ── PERMISSION GUARD ────────────────────────────────────────
async function guardPage(permKey){
  const raw=localStorage.getItem('nlAdmin');
  if(!raw){window.location.href='/admin/index.html';return;}
  const adminData=JSON.parse(raw);
  if(adminData.role==='master')return;
  // Always fetch FRESH permissions from Firestore
  try{
    const snap=await getDocs(query(collection(db,'coAdmins'),where('email','==',adminData.email)));
    if(snap.empty){showRestricted();return;}
    const freshPerms=snap.docs[0].data().permissions||{};
    adminData.permissions=freshPerms;
    localStorage.setItem('nlAdmin',JSON.stringify(adminData));
    if(freshPerms[permKey]!==true){showRestricted();return;}
  }catch(e){
    console.error('guardPage error:',e);
    showRestricted();
  }
}
function showRestricted(){
  document.body.innerHTML='<div style="min-height:100vh;background:#050D1A;display:flex;align-items:center;justify-content:center;font-family:Nunito,sans-serif;padding:20px;"><div style="background:#111E35;border:1px solid #1E3560;border-radius:20px;padding:40px 30px;text-align:center;max-width:400px;width:100%;"><div style="font-size:60px;margin-bottom:16px;">🔒</div><h2 style="color:#FF3B3B;font-size:20px;font-weight:900;margin-bottom:10px;">Access Restricted</h2><p style="color:#8BA4CC;font-size:14px;line-height:1.7;margin-bottom:24px;">You are restricted to use this action.<br>Contact the master admin to get permission.</p><button onclick="window.location.href=\x27/admin/panel.html\x27" style="background:linear-gradient(135deg,#0057FF,#00D4FF);color:#fff;border:none;border-radius:10px;padding:13px 30px;font-size:14px;font-weight:800;cursor:pointer;font-family:Nunito,sans-serif;width:100%;">← Go Back to Panel</button></div></div>';}
// ───────────────────────────────────────────────────────────
guardPage('approveWithdraw');

let allData=[],currentFilter='pending';

function showMsg(msg,type){
  const area=document.getElementById('msg-area');
  area.innerHTML='<div class="msg-'+(type==='ok'?'ok':'err')+'">'+msg+'</div>';
  setTimeout(()=>area.innerHTML='',5000);
}

async function load(){
  document.getElementById('loader').classList.add('show');
  const snap=await getDocs(collection(db,'pendingWithdrawals'));
  allData=snap.docs.map(d=>({id:d.id,...d.data()}));
  updateStats();
  document.getElementById('loader').classList.remove('show');
  render();
}

function updateStats(){
  document.getElementById('s-pending').textContent=allData.filter(d=>d.status==='pending').length;
  document.getElementById('s-approved').textContent=allData.filter(d=>d.status==='approved').length;
  document.getElementById('s-total').textContent='KES '+allData.filter(d=>d.status==='approved').reduce((s,d)=>s+(d.amount||0),0);
}

function render(){
  const filtered=allData.filter(d=>d.status===currentFilter);
  const list=document.getElementById('list');
  if(filtered.length===0){list.innerHTML='<div class="empty">No '+currentFilter+' withdrawals.</div>';return;}
  list.innerHTML=filtered.map(d=>`
    <div class="rc">
      <div class="rn">${d.username||''} <span class="${d.status}-badge">${d.status}</span></div>
      <div class="rrow"><div class="rl">Amount Entered</div><div class="amount-big">KES ${d.amount||0}</div></div>
      <div class="rrow"><div class="rl">Amount to Send</div><div class="amount-big" style="color:var(--green);">KES ${d.receive||0}</div></div>
      <div class="rrow"><div class="rl">Method</div><div class="rv">${d.method||'M-PESA'}</div></div>
      <div class="rrow"><div class="rl">Phone</div><div class="rv">${d.phone||'—'}</div></div>
      ${d.paypalEmail?`<div class="rrow"><div class="rl">PayPal</div><div class="rv">${d.paypalEmail}</div></div>`:''}
      <div class="rrow"><div class="rl">Time</div><div class="rv">${d.createdAt?new Date(d.createdAt.seconds*1000).toLocaleString():''}</div></div>
      ${d.status==='pending'?`<div class="btns">
        <button class="ab ap" onclick="approve(this,'${d.id}','${d.uid||''}',${d.amount||0},'${d.username||''}','${d.method||'M-PESA'}')">✅ Approve</button>
        <button class="ab rj" onclick="reject(this,'${d.id}','${d.uid||''}',${d.amount||0},'${d.username||''}')">❌ Reject</button>
      </div>`:''}
    </div>`).join('');
}

window.filterTab=function(f,el){
  currentFilter=f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');render();
};

window.approve=async function(btnEl,docId,uid,amount,username,method){
  const originalHTML=btnEl.innerHTML;
  btnEl.disabled=true;
  btnEl.innerHTML='<span class="spinner"></span>Approving...';
  try{
    // Get withdraw record to access receive amount
    const withdrawData=allData.find(d=>d.id===docId)||{};
    // Mark withdrawal as approved
    await updateDoc(doc(db,'pendingWithdrawals',docId),{status:'approved'});

    if(uid){
      // Get current user data to calculate correct values
      const userSnap=await getDoc(doc(db,'users',uid));
      if(userSnap.exists()){
        const userData=userSnap.data();
        const currentPending=userData.pending||0;
        const currentWithdrawn=userData.withdrawn||0;

        // CORRECT: subtract from pending, add to withdrawn
        // Do NOT use increment to avoid double counting
        await updateDoc(doc(db,'users',uid),{
          pending: Math.max(0, currentPending - amount),
          withdrawn: currentWithdrawn + amount
        });

        // Send withdrawal approved email
        try{
          await fetch('https://netlinkagencies.vercel.app/api/send-email',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
              type:'withdrawal_approved',
              to: userData.email||'',
              username: username,
              amount: 'KES '+amount,
              receive: 'KES '+(withdrawData.receive||amount),
              method: method||'M-PESA',
              date: new Date().toLocaleString()
            })
          });
        } catch(emailErr){
          console.log('Email error:',emailErr);
        }
      }
    }

    allData=allData.map(d=>d.id===docId?{...d,status:'approved'}:d);
    showMsg('✅ Withdrawal of KES '+amount+' for '+username+' approved! Amount moved from Pending to Withdrawn.','ok');
    updateStats();render();
  }catch(e){
    btnEl.disabled=false;
    btnEl.innerHTML=originalHTML;
    showMsg('❌ Error: '+e.message,'err');
  }
};

window.reject=async function(btnEl,docId,uid,amount,username){
  const originalHTML=btnEl.innerHTML;
  btnEl.disabled=true;
  btnEl.innerHTML='<span class="spinner"></span>Rejecting...';
  try{
    // Mark as rejected
    await updateDoc(doc(db,'pendingWithdrawals',docId),{status:'rejected'});

    if(uid){
      // Get current user data
      const userSnap=await getDoc(doc(db,'users',uid));
      if(userSnap.exists()){
        const userData=userSnap.data();
        const currentPending=userData.pending||0;
        const currentBalance=userData.balance||0;

        // CORRECT: subtract from pending, return to balance
        await updateDoc(doc(db,'users',uid),{
          pending: Math.max(0, currentPending - amount),
          balance: currentBalance + amount
        });

        // Send withdrawal rejected email
        try{
          await fetch('https://netlinkagencies.vercel.app/api/send-email',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
              type:'withdrawal_rejected',
              to: userData.email||'',
              username: username
            })
          });
        } catch(emailErr){
          console.log('Email error:',emailErr);
        }
      }
    }

    allData=allData.map(d=>d.id===docId?{...d,status:'rejected'}:d);
    showMsg('❌ Withdrawal rejected. KES '+amount+' returned to user Account Balance.','err');
    updateStats();render();
  }catch(e){
    btnEl.disabled=false;
    btnEl.innerHTML=originalHTML;
    showMsg('❌ Error: '+e.message,'err');
  }
};

window.openSB=()=>{document.getElementById('sb').classList.add('open');document.getElementById('ov').classList.add('show');};
window.closeSB=()=>{document.getElementById('sb').classList.remove('open');document.getElementById('ov').classList.remove('show');};
window.logout=()=>{localStorage.removeItem('nlAdmin');window.location.href='/admin/index.html';};
load();
</script>
<script>
(function(){
  try{
    const raw=localStorage.getItem('nlAdmin');
    if(raw){
      const ad=JSON.parse(raw);
      if(ad.role==='master'){
        const link=document.getElementById('apikey-nav-link');
        if(link) link.style.display='flex';
      }
    }
  }catch(e){}
})();
</script>
</body>
</html>
