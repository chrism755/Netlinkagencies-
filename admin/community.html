<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Community Posts — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--primary:#0057FF;--accent:#00D4FF;--green:#00C853;--red:#FF3B3B;--bg:#050D1A;--bg2:#0A1628;--bg3:#0F1F3D;--card:#111E35;--border:#1E3560;--text:#E8F0FF;--text2:#8BA4CC;--white:#FFFFFF;--sw:250px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.layout{display:flex;min-height:100vh;}
.sidebar{width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;z-index:100;transform:translateX(-100%);transition:.3s;display:flex;flex-direction:column;}
.sidebar.open{transform:translateX(0);}
.sb-head{padding:16px;border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:9px;}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.logo-text{font-family:'Orbitron',monospace;font-weight:900;font-size:11px;color:var(--white);line-height:1.1;}
.logo-sub{font-size:8px;color:var(--accent);letter-spacing:2px;font-family:'Orbitron',monospace;}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0;}
.ni{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;font-weight:600;color:var(--text2);border-left:3px solid transparent;text-decoration:none;transition:.15s;}
.ni:hover,.ni.active{background:rgba(0,87,255,.1);color:var(--accent);border-left-color:var(--primary);}
.ni-icon{font-size:15px;width:20px;text-align:center;}
.main{flex:1;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:13px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
.menu-btn{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;}
.tb-title{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--white);flex:1;}
.avatar{width:32px;height:32px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;}
.content{padding:16px 14px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;display:none;}
.overlay.show{display:block;}
.pc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;}
textarea{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;outline:none;resize:vertical;min-height:100px;margin-bottom:10px;}
textarea:focus{border-color:var(--primary);}
.btn{width:100%;padding:12px;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;}
.post{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:9px;}
.post-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.post-time{font-size:10px;color:var(--text2);}
.del-btn{background:var(--red);color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;}
.loader{position:fixed;inset:0;background:rgba(5,13,26,.95);z-index:9999;display:none;align-items:center;justify-content:center;}
.loader.show{display:flex;}
.ring{width:50px;height:50px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="ring"></div></div>
<div class="overlay" id="ov" onclick="closeSB()"></div>
<div class="layout">
  <nav class="sidebar" id="sb">
    <div class="sb-head"><div class="logo"><div class="logo-icon">🔗</div><div><div class="logo-text">NETLINK</div><div class="logo-sub">ADMIN</div></div></div></div>
    <div class="sb-nav">
      <a class="ni" href="/admin/panel.html"><span class="ni-icon">🏠</span>Dashboard</a>
      <a class="ni" href="/admin/users.html"><span class="ni-icon">👥</span>Manage Users</a>
      <a class="ni" href="/admin/activation.html"><span class="ni-icon">✅</span>Activation</a>
      <a class="ni" href="/admin/withdraw.html"><span class="ni-icon">💸</span>Withdrawals</a>
      <a class="ni" href="/admin/deposits.html"><span class="ni-icon">💰</span>Deposits</a>
      <a class="ni" href="/admin/client-payments.html"><span class="ni-icon">🧾</span>Client Payments</a>
      <a class="ni active" href="/admin/community.html"><span class="ni-icon">📝</span>Community Posts</a>
      <a class="ni" href="/admin/settings.html"><span class="ni-icon">⚙️</span>Settings</a>
      <a class="ni" href="/admin/api-key.html" id="apikey-nav-link" style="display:none;"><span class="ni-icon">🔑</span>API Keys</a>
      <a class="ni" style="color:var(--red);" onclick="logout()"><span class="ni-icon">🚪</span>Log Out</a>
    </div>
  </nav>
  <div class="main">
    <div class="topbar">
      <button class="menu-btn" onclick="openSB()">☰</button>
      <div class="tb-title">Community Posts</div>
      <div style="display:flex;align-items:center;gap:8px;"><div class="avatar">A</div><span style="font-size:12px;font-weight:700;">Admin</span></div>
    </div>
    <div class="content">
      <div class="pc">
        <h3 style="font-size:14px;font-weight:800;color:var(--white);margin-bottom:12px;">📝 New Post</h3>
        <textarea id="post-content" placeholder="Write your post for community..."></textarea>
        <button class="btn" onclick="publish()">📢 Publish to Community</button>
      </div>
      <div id="posts-list"><div style="text-align:center;padding:30px;color:var(--text2);">Loading posts...</div></div>
    </div>
  </div>
</div>
<script type="module">
if(!localStorage.getItem('nlAdmin')){window.location.href='/admin/index.html';}
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, serverTimestamp, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyCCFExYKkXxauIXVv2HzNHbNnizL6MF_p4",authDomain:"netlink-agencies-6399e.firebaseapp.com",projectId:"netlink-agencies-6399e",storageBucket:"netlink-agencies-6399e.firebasestorage.app",messagingSenderId:"546397751362",appId:"1:546397751362:web:c74e057b2b0ceb6c0745db"});
const db=getFirestore(app);

// ── PERMISSION GUARD ────────────────────────────────────────
async function guardPage(permKey){
  const raw=localStorage.getItem('nlAdmin');
  if(!raw){window.location.href='/admin/index.html';return;}
  const adminData=JSON.parse(raw);
  if(adminData.role==='master')return;
  // Always fetch FRESH permissions from Firestore
  try{
    const snap=await getDocs(query(collection(db,'coAdmins'),where('email','==',adminData.email)));
    if(snap.empty){showRestricted();return;}
    const freshPerms=snap.docs[0].data().permissions||{};
    adminData.permissions=freshPerms;
    localStorage.setItem('nlAdmin',JSON.stringify(adminData));
    if(freshPerms[permKey]!==true){showRestricted();return;}
  }catch(e){
    console.error('guardPage error:',e);
    showRestricted();
  }
}
function showRestricted(){
  document.body.innerHTML='<div style="min-height:100vh;background:#050D1A;display:flex;align-items:center;justify-content:center;font-family:Nunito,sans-serif;padding:20px;"><div style="background:#111E35;border:1px solid #1E3560;border-radius:20px;padding:40px 30px;text-align:center;max-width:400px;width:100%;"><div style="font-size:60px;margin-bottom:16px;">🔒</div><h2 style="color:#FF3B3B;font-size:20px;font-weight:900;margin-bottom:10px;">Access Restricted</h2><p style="color:#8BA4CC;font-size:14px;line-height:1.7;margin-bottom:24px;">You are restricted to use this action.<br>Contact the master admin to get permission.</p><button onclick="window.location.href=\x27/admin/panel.html\x27" style="background:linear-gradient(135deg,#0057FF,#00D4FF);color:#fff;border:none;border-radius:10px;padding:13px 30px;font-size:14px;font-weight:800;cursor:pointer;font-family:Nunito,sans-serif;width:100%;">← Go Back to Panel</button></div></div>';}
// ───────────────────────────────────────────────────────────
guardPage('postCommunity');

let posts=[];
async function load(){
  const snap=await getDocs(collection(db,'communityPosts'));
  posts=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  render();
}
function render(){
  const el=document.getElementById('posts-list');
  if(posts.length===0){el.innerHTML='<div style="text-align:center;padding:30px;color:var(--text2);">No posts yet.</div>';return;}
  el.innerHTML=posts.map(p=>`<div class="post"><div class="post-top"><div class="post-time">📅 ${p.createdAt?new Date(p.createdAt.seconds*1000).toLocaleString():''}</div><button class="del-btn" onclick="delPost('${p.id}')">🗑 Delete</button></div><p style="font-size:13px;line-height:1.6;">${p.content}</p></div>`).join('');
}
window.publish=async function(){
  const c=document.getElementById('post-content').value.trim();
  if(!c){showMsg('Write something first.','ok');return;}
  document.getElementById('loader').classList.add('show');
  await addDoc(collection(db,'communityPosts'),{content:c,createdAt:serverTimestamp()});
  document.getElementById('post-content').value='';
  await load();
  document.getElementById('loader').classList.remove('show');
  showMsg('✅ Published!','ok');
};
window.delPost=async function(id){
  await deleteDoc(doc(db,'communityPosts',id));
  posts=posts.filter(p=>p.id!==id);render();
};

window.showMsg=function(msg,type){
  let area=document.getElementById('msg-area');
  if(!area){area=document.createElement('div');area.id='msg-area';document.querySelector('.content').prepend(area);}
  area.innerHTML='<div style="background:'+(type==='ok'?'rgba(0,230,118,.1)':'rgba(255,82,82,.1)')+';border:1.5px solid '+(type==='ok'?'#00E676':'#FF5252')+';color:'+(type==='ok'?'#69F0AE':'#FF8A80')+';border-radius:12px;padding:14px;font-size:13px;margin-bottom:14px;font-family:Nunito,sans-serif;font-weight:600;">'+msg+'</div>';
  setTimeout(()=>{if(area)area.innerHTML='';},5000);
};
window.openSB=()=>{document.getElementById('sb').classList.add('open');document.getElementById('ov').classList.add('show');};
window.closeSB=()=>{document.getElementById('sb').classList.remove('open');document.getElementById('ov').classList.remove('show');};
window.logout=()=>{localStorage.removeItem('nlAdmin');window.location.href='/admin/index.html';};
load();
</script>
<script>
(function(){
  try{
    const raw=localStorage.getItem('nlAdmin');
    if(raw){
      const ad=JSON.parse(raw);
      if(ad.role==='master'){
        const link=document.getElementById('apikey-nav-link');
        if(link) link.style.display='flex';
      }
    }
  }catch(e){}
})();
</script>
</body>
</html>
