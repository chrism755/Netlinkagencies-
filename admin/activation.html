<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Activation — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--primary:#0057FF;--accent:#00D4FF;--green:#00C853;--red:#FF3B3B;--yellow:#FFB300;--bg:#050D1A;--bg2:#0A1628;--bg3:#0F1F3D;--card:#111E35;--border:#1E3560;--text:#E8F0FF;--text2:#8BA4CC;--white:#FFFFFF;--sw:250px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.layout{display:flex;min-height:100vh;}
.sidebar{width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;z-index:100;transform:translateX(-100%);transition:.3s;display:flex;flex-direction:column;}
.sidebar.open{transform:translateX(0);}
.sb-head{padding:16px;border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:9px;}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.logo-text{font-family:'Orbitron',monospace;font-weight:900;font-size:11px;color:var(--white);line-height:1.1;}
.logo-sub{font-size:8px;color:var(--accent);letter-spacing:2px;font-family:'Orbitron',monospace;}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0;}
.ni{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);border-left:3px solid transparent;text-decoration:none;transition:.15s;}
.ni:hover,.ni.active{background:rgba(0,87,255,.1);color:var(--accent);border-left-color:var(--primary);}
.ni-icon{font-size:15px;width:20px;text-align:center;}
.main{flex:1;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:13px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
.menu-btn{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;}
.tb-title{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--white);flex:1;}
.avatar{width:32px;height:32px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;}
.content{padding:16px 14px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;display:none;}
.overlay.show{display:block;}
.rc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;}
.rn{font-size:15px;font-weight:800;color:var(--white);margin-bottom:4px;}
.re{font-size:12px;color:var(--text2);margin-bottom:8px;}
.rrow{display:flex;justify-content:space-between;margin-bottom:5px;}
.rl{font-size:12px;color:var(--text2);font-weight:700;}.rv{font-size:13px;color:var(--white);font-weight:700;}
.pending{background:rgba(255,179,0,.12);border:1px solid var(--yellow);color:#FFD740;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:800;}
.approved{background:rgba(0,200,83,.12);border:1px solid var(--green);color:#69F0AE;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:800;}
.rejected{background:rgba(255,59,59,.12);border:1px solid var(--red);color:#FF8A80;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:800;}
.btns{display:flex;gap:7px;margin-top:10px;}
.ab{padding:8px 16px;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;}
.ab.ap{background:var(--green);color:#fff;flex:1;}
.ab.rj{background:var(--red);color:#fff;flex:1;}
.loader{position:fixed;inset:0;background:rgba(5,13,26,.95);z-index:9999;display:none;align-items:center;justify-content:center;}
.loader.show{display:flex;}
.ring{width:50px;height:50px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.tabs{display:flex;gap:8px;margin-bottom:14px;}
.tab{padding:8px 16px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:.2s;}
.tab.active{border-color:var(--primary);background:rgba(0,87,255,.1);color:var(--accent);}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="ring"></div></div>
<div class="overlay" id="ov" onclick="closeSB()"></div>
<div class="layout">
  <nav class="sidebar" id="sb">
    <div class="sb-head"><div class="logo"><div class="logo-icon">🔗</div><div><div class="logo-text">NETLINK</div><div class="logo-sub">ADMIN</div></div></div></div>
    <div class="sb-nav">
      <a class="ni" href="/admin/dashboard.html"><span class="ni-icon">🏠</span>Dashboard</a>
      <a class="ni" href="/admin/users.html"><span class="ni-icon">👥</span>Manage Users</a>
      <a class="ni active" href="/admin/activation.html"><span class="ni-icon">✅</span>Activation</a>
      <a class="ni" href="/admin/withdraw.html"><span class="ni-icon">💸</span>Withdrawals</a>
      <a class="ni" href="/admin/deposits.html"><span class="ni-icon">💰</span>Deposits</a>
      <a class="ni" href="/admin/community.html"><span class="ni-icon">📝</span>Community Posts</a>
      <a class="ni" href="/admin/settings.html"><span class="ni-icon">⚙️</span>Settings</a>
      <a class="ni" style="color:var(--red);" onclick="logout()"><span class="ni-icon">🚪</span>Log Out</a>
    </div>
  </nav>
  <div class="main">
    <div class="topbar">
      <button class="menu-btn" onclick="openSB()">☰</button>
      <div class="tb-title">Pending Activations</div>
      <div style="display:flex;align-items:center;gap:8px;"><div class="avatar">A</div><span style="font-size:12px;font-weight:700;">Admin</span></div>
    </div>
    <div class="content">
      <div class="tabs">
        <div class="tab active" onclick="filterTab('pending',this)">⏳ Pending</div>
        <div class="tab" onclick="filterTab('approved',this)">✅ Approved</div>
        <div class="tab" onclick="filterTab('rejected',this)">❌ Rejected</div>
      </div>
      <div id="list"><div style="text-align:center;padding:40px;color:var(--text2);">Loading...</div></div>
    </div>
  </div>
</div>
<script type="module">
if(!localStorage.getItem('nlAdmin')){window.location.href='/admin/index.html';}
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyCCFExYKkXxauIXVv2HzNHbNnizL6MF_p4",authDomain:"netlink-agencies-6399e.firebaseapp.com",projectId:"netlink-agencies-6399e",storageBucket:"netlink-agencies-6399e.firebasestorage.app",messagingSenderId:"546397751362",appId:"1:546397751362:web:c74e057b2b0ceb6c0745db"});
const db=getFirestore(app);
let allData=[];let currentFilter='pending';
document.getElementById('loader').classList.add('show');
async function load(){
  const snap=await getDocs(collection(db,'pendingActivations'));
  allData=snap.docs.map(d=>({id:d.id,...d.data()}));
  document.getElementById('loader').classList.remove('show');
  render();
}
function render(){
  const filtered=allData.filter(d=>d.status===currentFilter);
  const list=document.getElementById('list');
  if(filtered.length===0){list.innerHTML=`<div style="text-align:center;padding:40px;color:var(--text2);">No ${currentFilter} activations.</div>`;return;}
  list.innerHTML=filtered.map(d=>`
    <div class="rc">
      <div class="rn">${d.username||''} <span class="${d.status}">${d.status}</span></div>
      <div class="re">${d.email||''}</div>
      <div class="rrow"><div class="rl">Transaction ID</div><div class="rv" style="font-family:monospace;">${d.txnId||''}</div></div>
      <div class="rrow"><div class="rl">Time</div><div class="rv">${d.createdAt?new Date(d.createdAt.seconds*1000).toLocaleString():''}</div></div>
      ${d.status==='pending'?`<div class="btns">
        <button class="ab ap" onclick="approve('${d.id}','${d.uid}')">✅ Approve</button>
        <button class="ab rj" onclick="reject('${d.id}')">❌ Reject</button>
      </div>`:''}
    </div>`).join('');
}
window.filterTab=function(f,el){
  currentFilter=f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');render();
};
window.approve=async function(id,uid){
  await updateDoc(doc(db,'pendingActivations',id),{status:'approved'});
  if(uid)await updateDoc(doc(db,'users',uid),{activated:true});
  allData=allData.map(d=>d.id===id?{...d,status:'approved'}:d);
  alert('✅ Account activated!');render();
};
window.reject=async function(id){
  await updateDoc(doc(db,'pendingActivations',id),{status:'rejected'});
  allData=allData.map(d=>d.id===id?{...d,status:'rejected'}:d);
  alert('❌ Rejected.');render();
};
window.openSB=()=>{document.getElementById('sb').classList.add('open');document.getElementById('ov').classList.add('show');};
window.closeSB=()=>{document.getElementById('sb').classList.remove('open');document.getElementById('ov').classList.remove('show');};
window.logout=()=>{localStorage.removeItem('nlAdmin');window.location.href='/admin/index.html';};
load();
</script>
</body>
</html>
