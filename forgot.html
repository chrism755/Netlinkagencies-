<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Forgot Password — NETLINK AGENCIES</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--primary:#E91E63;--accent:#FF1493;--green:#00C853;--red:#FF3B3B;--bg:#E91E63;--bg3:#F0F4F8;--card:#FFFFFF;--border:#E0E0E0;--text:#1A1A1A;--text2:#666666;--white:#FFFFFF;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:linear-gradient(180deg,#E91E63 0%,#FF1493 50%,#FF9800 100%);color:var(--text);min-height:100vh;}
.bg{position:fixed;inset:0;pointer-events:none;}
.bg::before{content:'';position:absolute;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(255,255,255,.08),transparent 70%);border-radius:50%;}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:60px 16px;}
.logo{display:flex;align-items:center;gap:15px;justify-content:center;margin-bottom:20px;}
.logo-icon{width:80px;height:80px;position:relative;display:flex;align-items:center;justify-content:center;}
.netlink-logo{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
/* Outer circles */
.network-outer{position:absolute;width:100%;height:100%;border:2px solid rgba(255,20,147,.4);border-radius:50%;animation:pulse 3s ease-in-out infinite;}
.network-middle{position:absolute;width:85%;height:85%;border:1.5px solid rgba(255,20,147,.5);border-radius:50%;animation:pulse 3s ease-in-out infinite .3s;}
/* Center circle with N */
.network-center{position:relative;width:50px;height:50px;background:linear-gradient(135deg,#FF1493,#E91E63);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:28px;color:#fff;box-shadow:0 0 20px rgba(255,20,147,.6),inset 0 0 10px rgba(0,0,0,.2);z-index:10;}
/* Nodes around the circle */
.node{position:absolute;width:12px;height:12px;background:radial-gradient(circle,#FF1493,#E91E63);border-radius:50%;box-shadow:0 0 15px rgba(255,20,147,.8);}
.node:nth-child(2){top:5%;left:50%;transform:translateX(-50%);}
.node:nth-child(3){top:13%;right:13%;transform:translate(0,0);}
.node:nth-child(4){right:5%;top:50%;transform:translateY(-50%);}
.node:nth-child(5){bottom:13%;right:13%;}
.node:nth-child(6){bottom:5%;left:50%;transform:translateX(-50%);}
.node:nth-child(7){bottom:13%;left:13%;}
.node:nth-child(8){left:5%;top:50%;transform:translateY(-50%);}
.node:nth-child(9){top:13%;left:13%;}
/* Lines connecting nodes */
svg{position:absolute;width:100%;height:100%;top:0;left:0;z-index:1;}
@keyframes pulse{0%,100%{opacity:.6;}50%{opacity:1;}}
.logo-text{font-family:'Orbitron',monospace;font-weight:900;font-size:18px;color:var(--white);line-height:1.1;}
.logo-sub{font-size:10px;color:rgba(255,255,255,.9);letter-spacing:2px;font-family:'Orbitron',monospace;}
h1{font-family:'Nunito',sans-serif;font-size:24px;font-weight:800;color:var(--white);margin-bottom:6px;text-align:center;}
.sub{color:rgba(255,255,255,.95);font-size:14px;text-align:center;margin-bottom:30px;}
.card{background:var(--card);border:none;border-radius:20px;padding:32px 24px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.fg{margin-bottom:16px;}
label{display:block;font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}
input{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:12px 15px;color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;outline:none;transition:.2s;}
input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(233,30,99,.1);}
input::placeholder{color:var(--text2);opacity:.7;}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;background:linear-gradient(90deg,#E91E63,#FF9800);color:var(--white);transition:.3s;box-shadow:0 8px 20px rgba(233,30,99,.3);}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 25px rgba(233,30,99,.4);}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.ok{background:rgba(0,200,83,.12);border:1.5px solid var(--green);color:#2E7D32;border-radius:10px;padding:12px 15px;font-size:13px;margin:10px 0;display:none;font-weight:500;}
.err{background:rgba(255,59,59,.12);border:1.5px solid var(--red);color:#C62828;border-radius:10px;padding:12px 15px;font-size:13px;margin:10px 0;display:none;font-weight:500;}
.link{text-align:center;margin-top:16px;font-size:13px;color:var(--text2);}
.link a{color:var(--primary);font-weight:700;text-decoration:none;}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <line x1="40" y1="40" x2="40" y2="8" stroke="rgba(255,20,147,0.3)" stroke-width="1.5"/>
        <line x1="40" y1="40" x2="63" y2="17" stroke="rgba(255,20,147,0.3)" stroke-width="1.5"/>
        <line x1="40" y1="40" x2="72" y2="40" stroke="rgba(255,20,147,0.3)" stroke-width="1.5"/>
        <line x1="40" y1="40" x2="63" y2="63" stroke="rgba(255,20,147,0.3)" stroke-width="1.5"/>
        <line x1="40" y1="40" x2="40" y2="72" stroke="rgba(255,20,147,0.3)" stroke-width="1.5"/>
        <line x1="40" y1="40" x2="17" y2="63" stroke="rgba(255,20,147,0.3)" stroke-width="1.5"/>
        <line x1="40" y1="40" x2="8" y2="40" stroke="rgba(255,20,147,0.3)" stroke-width="1.5"/>
        <line x1="40" y1="40" x2="17" y2="17" stroke="rgba(255,20,147,0.3)" stroke-width="1.5"/>
      </svg>
      <div class="netlink-logo">
        <div class="network-outer"></div>
        <div class="network-middle"></div>
        <div class="node"></div>
        <div class="node"></div>
        <div class="node"></div>
        <div class="node"></div>
        <div class="node"></div>
        <div class="node"></div>
        <div class="node"></div>
        <div class="node"></div>
        <div class="network-center">N</div>
      </div>
    </div>
    <div><div class="logo-text">NETLINK</div><div class="logo-sub">AGENCIES</div></div>
  </div>
  <h1>Reset Password</h1><p class="sub">Enter your username or email to reset</p>
  <div class="card">
    <div class="fg"><label>Username or Email</label><input id="email" type="text" placeholder="Enter username or email"/></div>
    <div class="ok" id="ok">✅ Reset link sent! Check your inbox.</div>
    <div class="err" id="err"></div>
    <button class="btn" onclick="doForgot()">Send Reset Instructions</button>
    <div class="link" style="margin-top:16px;"><a href="/login.html">← Back to Login</a></div>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
const app=initializeApp({apiKey:"AIzaSyCCFExYKkXxauIXVv2HzNHbNnizL6MF_p4",authDomain:"netlink-agencies-6399e.firebaseapp.com",projectId:"netlink-agencies-6399e",storageBucket:"netlink-agencies-6399e.firebasestorage.app",messagingSenderId:"546397751362",appId:"1:546397751362:web:c74e057b2b0ceb6c0745db"});
const auth=getAuth(app);
window.doForgot=async function(){
  const e=document.getElementById('email').value.trim();
  if(!e){return;}
  try{await sendPasswordResetEmail(auth,e);document.getElementById('ok').style.display='block';}
  catch(e2){document.getElementById('err').textContent='❌ Email not found.';document.getElementById('err').style.display='block';}
};
</script>
</body>
</html>
