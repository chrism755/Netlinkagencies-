<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Forgot Password — NETLINK AGENCIES</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--primary:#0057FF;--accent:#00D4FF;--green:#00C853;--red:#FF3B3B;--bg:#050D1A;--bg3:#0F1F3D;--card:#111E35;--border:#1E3560;--text:#E8F0FF;--text2:#8BA4CC;--white:#FFFFFF;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.bg{position:fixed;inset:0;pointer-events:none;}
.bg::before{content:'';position:absolute;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(0,87,255,.15),transparent 70%);border-radius:50%;}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:60px 16px;}
.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:14px;}
.logo-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 24px rgba(0,87,255,.5);}
.logo-text{font-family:'Orbitron',monospace;font-weight:900;font-size:16px;color:var(--white);line-height:1.1;}
.logo-sub{font-size:9px;color:var(--accent);letter-spacing:3px;font-family:'Orbitron',monospace;}
h1{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:var(--white);margin-bottom:6px;text-align:center;}
.sub{color:var(--text2);font-size:13px;text-align:center;margin-bottom:24px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 24px;width:100%;max-width:420px;}
.fg{margin-bottom:16px;}
label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;}
input{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:12px 15px;color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;outline:none;}
input:focus{border-color:var(--primary);}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;background:linear-gradient(135deg,var(--primary),var(--accent));color:var(--white);}
.ok{background:rgba(0,200,83,.12);border:1.5px solid var(--green);color:#69F0AE;border-radius:10px;padding:12px 15px;font-size:13px;margin:10px 0;display:none;}
.err{background:rgba(255,59,59,.12);border:1.5px solid var(--red);color:#FF8A80;border-radius:10px;padding:12px 15px;font-size:13px;margin:10px 0;display:none;}
.link{text-align:center;margin-top:14px;font-size:13px;color:var(--text2);}
.link a{color:var(--accent);font-weight:700;text-decoration:none;}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <div class="logo"><div class="logo-icon">🔗</div><div><div class="logo-text">NETLINK</div><div class="logo-sub">AGENCIES</div></div></div>
  <h1>Reset Password</h1><p class="sub">Enter your email to reset</p>
  <div class="card">
    <div class="fg"><label>Email Address</label><input id="email" type="email" placeholder="Your registered email"/></div>
    <div class="ok" id="ok">✅ Reset link sent! Check your inbox.</div>
    <div class="err" id="err"></div>
    <button class="btn" onclick="doForgot()">📧 Send Reset Link</button>
    <div class="link" style="margin-top:14px;"><a href="/login.html">← Back to Login</a></div>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
const app=initializeApp({apiKey:"AIzaSyCCFExYKkXxauIXVv2HzNHbNnizL6MF_p4",authDomain:"netlink-agencies-6399e.firebaseapp.com",projectId:"netlink-agencies-6399e",storageBucket:"netlink-agencies-6399e.firebasestorage.app",messagingSenderId:"546397751362",appId:"1:546397751362:web:c74e057b2b0ceb6c0745db"});
const auth=getAuth(app);
window.doForgot=async function(){
  const e=document.getElementById('email').value.trim();
  if(!e){return;}
  try{await sendPasswordResetEmail(auth,e);document.getElementById('ok').style.display='block';}
  catch(e2){document.getElementById('err').textContent='❌ Email not found.';document.getElementById('err').style.display='block';}
};
</script>
</body>
</html>
