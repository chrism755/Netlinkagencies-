<title>Reset Password — NETLINK AGENCIES</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--primary:#E91E63;--accent:#FF1493;--green:#00C853;--red:#FF3B3B;--bg:#E91E63;--bg3:#F0F4F8;--card:#FFFFFF;--border:#E0E0E0;--text:#1A1A1A;--text2:#666666;--white:#FFFFFF;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:linear-gradient(180deg,#E91E63 0%,#FF1493 50%,#FF9800 100%);color:var(--text);min-height:100vh;}
.bg{position:fixed;inset:0;pointer-events:none;}
.bg::before{content:'';position:absolute;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(255,255,255,.08),transparent 70%);border-radius:50%;}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:60px 16px;}
.logo{display:flex;align-items:center;gap:15px;justify-content:center;margin-bottom:20px;}
.logo-icon{width:80px;height:80px;position:relative;display:flex;align-items:center;justify-content:center;}
.netlink-logo{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
/* Outer circles */
.network-outer{position:absolute;width:100%;height:100%;border:2px solid rgba(255,20,147,.4);border-radius:50%;animation:pulse 3s ease-in-out infinite;}
.network-middle{position:absolute;width:85%;height:85%;border:1.5px solid rgba(255,20,147,.5);border-radius:50%;animation:pulse 3s ease-in-out infinite .3s;}
/* Center circle with logo */
.network-center{position:relative;width:50px;height:50px;background:linear-gradient(135deg,#FF1493,#E91E63);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:32px;color:#fff;overflow:hidden;}
.network-center img{width:100%;height:100%;object-fit:cover;}
/* Nodes around the circle */
.node{position:absolute;width:12px;height:12px;background:radial-gradient(circle,#FF1493,#E91E63);border-radius:50%;box-shadow:0 0 15px rgba(255,20,147,.8);}
.node:nth-child(2){top:5%;left:50%;transform:translateX(-50%);}
.node:nth-child(3){top:13%;right:13%;transform:translate(0,0);}
.node:nth-child(4){right:5%;top:50%;transform:translateY(-50%);}
.node:nth-child(5){bottom:13%;right:13%;}
.node:nth-child(6){bottom:5%;left:50%;transform:translateX(-50%);}
.node:nth-child(7){bottom:13%;left:13%;}
.node:nth-child(8){left:5%;top:50%;transform:translateY(-50%);}
.node:nth-child(9){top:13%;left:13%;}
/* Lines connecting nodes */
svg{position:absolute;width:100%;height:100%;top:0;left:0;z-index:1;}
@keyframes pulse{0%,100%{opacity:.6;}50%{opacity:1;}}
.logo-text{font-family:'Orbitron',monospace;font-weight:900;font-size:18px;color:var(--white);line-height:1.1;}
.logo-sub{font-size:10px;color:rgba(255,255,255,.9);letter-spacing:2px;font-family:'Orbitron',monospace;}
h1{font-family:'Nunito',sans-serif;font-size:24px;font-weight:800;color:var(--white);margin-bottom:6px;text-align:center;}
.sub{color:rgba(255,255,255,.95);font-size:14px;text-align:center;margin-bottom:30px;}
.card{background:var(--card);border:none;border-radius:20px;padding:32px 24px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.fg{margin-bottom:16px;}
label{display:block;font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}
input{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:12px 15px;color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;outline:none;transition:all .3s;}
input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(233,30,99,.1);}
input::placeholder{color:var(--text2);opacity:.7;}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;background:linear-gradient(90deg,#E91E63,#FF9800);color:var(--white);transition:all .3s;box-shadow:0 8px 20px rgba(233,30,99,.3);}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 25px rgba(233,30,99,.4);}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.ok{background:rgba(0,200,83,.12);border:1.5px solid var(--green);color:#2E7D32;border-radius:10px;padding:12px 15px;font-size:13px;margin:10px 0;display:none;font-weight:500;}
.err{background:rgba(255,59,59,.12);border:1.5px solid var(--red);color:#C62828;border-radius:10px;padding:12px 15px;font-size:13px;margin:10px 0;display:none;font-weight:500;}
.link{text-align:center;margin-top:16px;font-size:13px;color:var(--text2);}
.link a{color:var(--primary);font-weight:700;text-decoration:none;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

<div class="wrap">

        <div class="network-center">
          <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Cdefs%3E%3Cstyle%3E.logo-center%7Bfill:%23FF1493%7D.logo-text%7Bfill:%23fff;font-family:Orbitron,monospace;font-weight:900;font-size:28px%7D.node%7Bfill:%23FF1493;filter:drop-shadow(0 0 8px rgba(255,20,147,0.8))%7D%3C/style%3E%3C/defs%3E%3Ccircle cx='100' cy='100' r='100' fill='%231a0a2e' opacity='0.9'/%3E%3Ccircle cx='100' cy='100' r='90' fill='none' stroke='rgba(255,20,147,0.4)' stroke-width='2'/%3E%3Ccircle cx='100' cy='100' r='75' fill='none' stroke='rgba(255,20,147,0.3)' stroke-width='1.5'/%3E%3Ccircle cx='100' cy='30' r='6' class='node'/%3E%3Ccircle cx='156' cy='45' r='6' class='node'/%3E%3Ccircle cx='170' cy='100' r='6' class='node'/%3E%3Ccircle cx='156' cy='155' r='6' class='node'/%3E%3Ccircle cx='100' cy='170' r='6' class='node'/%3E%3Ccircle cx='44' cy='155' r='6' class='node'/%3E%3Ccircle cx='30' cy='100' r='6' class='node'/%3E%3Ccircle cx='44' cy='45' r='6' class='node'/%3E%3Cline x1='100' y1='100' x2='100' y2='30' stroke='rgba(255,20,147,0.3)' stroke-width='1'/%3E%3Cline x1='100' y1='100' x2='156' y2='45' stroke='rgba(255,20,147,0.3)' stroke-width='1'/%3E%3Cline x1='100' y1='100' x2='170' y2='100' stroke='rgba(255,20,147,0.3)' stroke-width='1'/%3E%3Cline x1='100' y1='100' x2='156' y2='155' stroke='rgba(255,20,147,0.3)' stroke-width='1'/%3E%3Cline x1='100' y1='100' x2='100' y2='170' stroke='rgba(255,20,147,0.3)' stroke-width='1'/%3E%3Cline x1='100' y1='100' x2='44' y2='155' stroke='rgba(255,20,147,0.3)' stroke-width='1'/%3E%3Cline x1='100' y1='100' x2='30' y2='100' stroke='rgba(255,20,147,0.3)' stroke-width='1'/%3E%3Cline x1='100' y1='100' x2='44' y2='45' stroke='rgba(255,20,147,0.3)' stroke-width='1'/%3E%3Ccircle cx='100' cy='100' r='35' class='logo-center'/%3E%3Ctext x='100' y='115' text-anchor='middle' class='logo-text'%3EN%3C/text%3E%3C/svg%3E" alt="NETLINK Logo"/>

  <h1>Reset Password</h1><p class="sub">Enter your username or email to reset</p>
  <div class="card">
    <div class="fg"><label>Username or Email</label><input id="email" type="text" placeholder="Enter username or email"/></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=initializeApp({apiKey:"AIzaSyCCFExYKkXxauIXVv2HzNHbNnizL6MF_p4",authDomain:"netlink-agencies-6399e.firebaseapp.com",projectId:"netlink-agencies-6399e",storageBucket:"netlink-agencies-6399e.firebasestorage.app",messagingSenderId:"546397751362",appId:"1:546397751362:web:c74e057b2b0ceb6c0745db"});
const db=getFirestore(app);

window.doForgot=async function(){
  const btn=document.getElementById('btn');
  const ok=document.getElementById('ok');
  const err=document.getElementById('err');
  let input=document.getElementById('email').value.trim().toLowerCase();

  ok.style.display='none';
  err.style.display='none';

  if(!input){
    err.textContent='⚠️ Please enter your username or email.';
    err.style.display='block';
    return;
  }

  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span> Sending...';

  try{
    let emailToReset=input;
    let username=input;

    // If input is not an email, look up by username in Firestore
    if(!input.includes('@')){
      const q=query(collection(db,'users'),where('username','==',input));
      const snap=await getDocs(q);
      if(snap.empty){
        err.textContent='❌ No account found with that username.';
        err.style.display='block';
        btn.disabled=false;
        btn.innerHTML='Send Reset Instructions';
        return;
      }
      const userData=snap.docs[0].data();
      emailToReset=userData.email;
      username=userData.username;
    } else {
      // Look up username by email
      const q=query(collection(db,'users'),where('email','==',input));
      const snap=await getDocs(q);
      if(!snap.empty) username=snap.docs[0].data().username||input;
    }

    // Send reset request to your Vercel API which generates the link and sends email
    const res=await fetch('https://netlinkagencies.vercel.app/api/reset-password',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        email:emailToReset,
        username:username
      })
    });

    const data=await res.json();
    if(data.success){
      ok.textContent='✅ Password reset link sent! Check your inbox (not spam).';
      ok.style.display='block';
      document.getElementById('email').value='';
    } else {
      throw new Error(data.error||'Email sending failed.');
    }

  }catch(e2){
    console.error(e2);
    err.textContent='❌ '+(e2.message||'Something went wrong. Please try again.');
    err.style.display='block';
  }

  btn.disabled=false;
  btn.innerHTML='Send Reset Instructions';
};
</script>
