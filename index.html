<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NETLINK AGENCIES</title>
<style>
body{background:#050D1A;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Nunito',sans-serif;color:#E8F0FF;flex-direction:column;gap:16px;}
.logo-icon{width:60px;height:60px;background:linear-gradient(135deg,#0057FF,#00D4FF);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;}
.ring{width:40px;height:40px;border:3px solid #1E3560;border-top-color:#0057FF;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
p{color:#8BA4CC;font-size:13px;}
</style>
</head>
<body>
<div class="logo-icon">🔗</div>
<div class="ring"></div>
<p>Loading NETLINK AGENCIES...</p>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCCFExYKkXxauIXVv2HzNHbNnizL6MF_p4",
  authDomain:"netlink-agencies-6399e.firebaseapp.com",
  projectId:"netlink-agencies-6399e",
  storageBucket:"netlink-agencies-6399e.firebasestorage.app",
  messagingSenderId:"546397751362",
  appId:"1:546397751362:web:c74e057b2b0ceb6c0745db"
});
const auth = getAuth(app);
const db = getFirestore(app);

// If admin is logged in, go to admin
if(localStorage.getItem('nlAdmin')==='true'){
  window.location.replace('/admin/index.html');
}

onAuthStateChanged(auth, async user => {
  if(user){
    try{
      const snap = await getDoc(doc(db,'users', user.uid));
      if(snap.exists()){
        const data = snap.data();
        if(data.activated){
          window.location.replace('/dashboard.html');
        } else {
          window.location.replace('/activate.html');
        }
      } else {
        window.location.replace('/login.html');
      }
    }catch(e){
      window.location.replace('/login.html');
    }
  } else {
    window.location.replace('/login.html');
  }
});

// Fallback — if Firebase takes too long, go to login after 5 seconds
setTimeout(()=>{
  window.location.replace('/login.html');
}, 5000);
</script>
</body>
</html>
