<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login — NETLINK AGENCIES</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--primary:#0057FF;--accent:#00D4FF;--red:#FF3B3B;--bg:#050D1A;--bg3:#0F1F3D;--card:#111E35;--border:#1E3560;--text:#E8F0FF;--text2:#8BA4CC;--white:#FFFFFF;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.bg{position:fixed;inset:0;pointer-events:none;}
.bg::before{content:'';position:absolute;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(0,87,255,.15),transparent 70%);border-radius:50%;}
.bg::after{content:'';position:absolute;bottom:-200px;right:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(0,212,255,.1),transparent 70%);border-radius:50%;}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:80px 16px;}
.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:14px;}
.logo-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 24px rgba(0,87,255,.5);}
.logo-text{font-family:'Orbitron',monospace;font-weight:900;font-size:16px;color:var(--white);line-height:1.1;}
.logo-sub{font-size:9px;color:var(--accent);letter-spacing:3px;font-family:'Orbitron',monospace;}
h1{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:var(--white);margin-bottom:6px;text-align:center;}
.sub{color:var(--text2);font-size:13px;text-align:center;margin-bottom:24px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 24px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.stitle{font-family:'Orbitron',monospace;font-size:11px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:18px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.fg{margin-bottom:14px;}
label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;text-transform:uppercase;}
input{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:12px 15px;color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;outline:none;transition:.2s;}
input:focus{border-color:var(--primary);}
input::placeholder{color:var(--text2);opacity:.6;}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;background:linear-gradient(135deg,var(--primary),var(--accent));color:var(--white);margin-top:4px;}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.err{background:rgba(255,59,59,.12);border:1.5px solid var(--red);color:#FF8A80;border-radius:10px;padding:12px;font-size:13px;margin:10px 0;display:none;}
.link{text-align:center;margin-top:14px;font-size:13px;color:var(--text2);}
.link a{color:var(--accent);font-weight:700;text-decoration:none;}
.divider{text-align:center;color:var(--text2);font-size:11px;margin:14px 0;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:38%;height:1px;background:var(--border);}
.divider::before{left:0;}.divider::after{right:0;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <div class="logo"><div class="logo-icon">🔗</div><div><div class="logo-text">NETLINK</div><div class="logo-sub">AGENCIES</div></div></div>
  <h1>Welcome Back</h1>
  <p class="sub">Sign in to your account</p>
  <div class="card">
    <div class="stitle">🔐 Login</div>
    <div class="fg"><label>Email Address</label><input id="email" type="email" placeholder="Your email"/></div>
    <div class="fg"><label>Password</label><input id="password" type="password" placeholder="Your password" onkeypress="if(event.key==='Enter')doLogin()"/></div>
    <div class="err" id="err"></div>
    <button class="btn" id="btn" onclick="doLogin()">🔓 Log In</button>
    <div class="link" style="margin-top:12px;"><a href="/forgot.html">Forgot Password?</a></div>
    <div class="divider">OR</div>
    <div class="link">No account? <a href="/register.html">Register Free</a></div>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCCFExYKkXxauIXVv2HzNHbNnizL6MF_p4",
  authDomain:"netlink-agencies-6399e.firebaseapp.com",
  projectId:"netlink-agencies-6399e",
  storageBucket:"netlink-agencies-6399e.firebasestorage.app",
  messagingSenderId:"546397751362",
  appId:"1:546397751362:web:c74e057b2b0ceb6c0745db"
});
const auth = getAuth(app);
const db = getFirestore(app);

window.doLogin = async function(){
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  err.style.display='none';

  const e = document.getElementById('email').value.trim();
  const pw = document.getElementById('password').value;

  if(!e||!pw){err.textContent='⚠️ Enter email and password.';err.style.display='block';return;}

  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span> Signing in...';

  try{
    // Login with Firebase Auth
    const cred = await signInWithEmailAndPassword(auth, e, pw);

    // Get user data
    const snap = await getDoc(doc(db,'users', cred.user.uid));
    if(snap.exists()){
      const data = snap.data();
      // Save to localStorage for fast access
      localStorage.setItem('nlUser', JSON.stringify({...data, uid:cred.user.uid}));
      // Redirect based on activation status
      window.location.href = data.activated ? 'https://netlinkagencies.linkpc.net/dashboard.html' : 'https://netlinkagencies.linkpc.net/activate.html';
    } else {
      window.location.href = 'https://netlinkagencies.linkpc.net/activate.html';
    }
  }catch(e2){
    btn.disabled=false;
    btn.innerHTML='🔓 Log In';
    err.textContent='❌ Wrong email or password. Try again.';
    err.style.display='block';
  }
};
</script>
</body>
</html>
