<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login — NETLINK AGENCIES</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--primary:#E91E63;--accent:#FF1493;--red:#FF3B3B;--bg:#E91E63;--bg3:#F0F4F8;--card:#FFFFFF;--border:#E0E0E0;--text:#1A1A1A;--text2:#666666;--white:#FFFFFF;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:linear-gradient(180deg,#E91E63 0%,#FF1493 50%,#FF9800 100%);color:var(--text);min-height:100vh;}
.bg{position:fixed;inset:0;pointer-events:none;}
.bg::before{content:'';position:absolute;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(255,255,255,.08),transparent 70%);border-radius:50%;}
.bg::after{content:'';position:absolute;bottom:-200px;right:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(255,255,255,.06),transparent 70%);border-radius:50%;}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:60px 16px;}
.logo{display:flex;align-items:center;gap:15px;justify-content:center;margin-bottom:20px;}
.logo-icon{width:80px;height:80px;position:relative;display:flex;align-items:center;justify-content:center;}
.netlink-logo{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
/* Outer circles */
.network-outer{position:absolute;width:100%;height:100%;border:2px solid rgba(255,20,147,.4);border-radius:50%;animation:pulse 3s ease-in-out infinite;}
.network-middle{position:absolute;width:85%;height:85%;border:1.5px solid rgba(255,20,147,.5);border-radius:50%;animation:pulse 3s ease-in-out infinite .3s;}
/* Center circle with logo */
.network-center{position:relative;width:50px;height:50px;background:linear-gradient(135deg,#FF1493,#E91E63);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;}
.network-center img{width:100%;height:100%;object-fit:cover;}
/* Nodes around the circle */
.node{position:absolute;width:12px;height:12px;background:radial-gradient(circle,#FF1493,#E91E63);border-radius:50%;box-shadow:0 0 15px rgba(255,20,147,.8);}
.node:nth-child(2){top:5%;left:50%;transform:translateX(-50%);}
.node:nth-child(3){top:13%;right:13%;transform:translate(0,0);}
.node:nth-child(4){right:5%;top:50%;transform:translateY(-50%);}
.node:nth-child(5){bottom:13%;right:13%;}
.node:nth-child(6){bottom:5%;left:50%;transform:translateX(-50%);}
.node:nth-child(7){bottom:13%;left:13%;}
.node:nth-child(8){left:5%;top:50%;transform:translateY(-50%);}
.node:nth-child(9){top:13%;left:13%;}
/* Lines connecting nodes */
svg{position:absolute;width:100%;height:100%;top:0;left:0;z-index:1;}
@keyframes pulse{0%,100%{opacity:.6;}50%{opacity:1;}}
.logo-text{font-family:'Orbitron',monospace;font-weight:900;font-size:18px;color:var(--white);line-height:1.1;}
.logo-sub{font-size:10px;color:rgba(255,255,255,.9);letter-spacing:2px;font-family:'Orbitron',monospace;}
h1{font-family:'Nunito',sans-serif;font-size:24px;font-weight:800;color:var(--white);margin-bottom:6px;text-align:center;}
.sub{color:rgba(255,255,255,.95);font-size:14px;text-align:center;margin-bottom:30px;}
.card{background:var(--card);border:none;border-radius:20px;padding:32px 24px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.stitle{display:none;}
.fg{margin-bottom:16px;}
label{display:block;font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}
input{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:12px 15px;color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;outline:none;transition:.2s;}
input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(233,30,99,.1);}
input::placeholder{color:var(--text2);opacity:.7;}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;background:linear-gradient(90deg,#E91E63,#FF9800);color:var(--white);transition:.2s;box-shadow:0 4px 15px rgba(233,30,99,.3);}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 25px rgba(233,30,99,.4);}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.err{background:rgba(255,59,59,.12);border:1.5px solid var(--red);color:#C62828;border-radius:10px;padding:12px;font-size:13px;margin:10px 0;display:none;font-weight:500;}
.link{text-align:center;margin-top:16px;font-size:13px;color:var(--text2);}
.link a{color:var(--primary);font-weight:700;text-decoration:none;}
.divider{text-align:center;color:var(--text2);font-size:11px;margin:14px 0;position:relative;display:none;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:38%;height:1px;background:var(--border);}
.divider::before{left:0;}.divider::after{right:0;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <line x1="40" y1="40" x2="40" y2="8" stroke="rgba(255,20,147,0.3)" stroke-width="1.5"/>
        <line x1="40" y1="40" x2="63" y2="17" stroke="rgba(255,20,147,0.3)" stroke-width="1.5"/>
        <line x1="40" y1="40" x2="72" y2="40" stroke="rgba(255,20,147,0.3)" stroke-width="1.5"/>
        <line x1="40" y1="40" x2="63" y2="63" stroke="rgba(255,20,147,0.3)" stroke-width="1.5"/>
        <line x1="40" y1="40" x2="40" y2="72" stroke="rgba(255,20,147,0.3)" stroke-width="1.5"/>
        <line x1="40" y1="40" x2="17" y2="63" stroke="rgba(255,20,147,0.3)" stroke-width="1.5"/>
        <line x1="40" y1="40" x2="8" y2="40" stroke="rgba(255,20,147,0.3)" stroke-width="1.5"/>
        <line x1="40" y1="40" x2="17" y2="17" stroke="rgba(255,20,147,0.3)" stroke-width="1.5"/>
      </svg>
      <div class="netlink-logo">
        <div class="network-outer"></div>
        <div class="network-middle"></div>
        <div class="node"></div>
        <div class="node"></div>
        <div class="node"></div>
        <div class="node"></div>
        <div class="node"></div>
        <div class="node"></div>
        <div class="node"></div>
        <div class="node"></div>
        <div class="network-center">
          <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Cdefs%3E%3Cstyle%3E.logo-center%7Bfill:%23FF1493%7D.logo-text%7Bfill:%23fff;font-family:Orbitron;font-size:80px;font-weight:900%7D%3C/style%3E%3C/defs%3E%3Ccircle cx='100' cy='100' r='100' class='logo-center'/%3E%3Ctext x='100' y='130' text-anchor='middle' class='logo-text'%3E%F0%9F%94%97%3C/text%3E%3C/svg%3E" alt="Logo"/>
        </div>
      </div>
    </div>
    <div><div class="logo-text">NETLINK</div><div class="logo-sub">AGENCIES</div></div>
  </div>
  <h1>Welcome Back</h1>
  <p class="sub">Linking You to Financial Solutions</p>
  <div class="card">
    <div class="fg"><label>Username</label><input id="username" type="text" placeholder="your username"/></div>
    <div class="fg"><label>Password</label><input id="password" type="password" placeholder="••••••" onkeypress="if(event.key==='Enter')doLogin()"/></div>
    <div class="err" id="err"></div>
    <button class="btn" id="btn" onclick="doLogin()">Login</button>
    <div class="link" style="margin-top:16px;"><a href="/resetpassword">Forgot password?</a></div>
    <div class="link">Don't have an account? <a href="/register">Create Account</a></div>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCCFExYKkXxauIXVv2HzNHbNnizL6MF_p4",
  authDomain:"netlink-agencies-6399e.firebaseapp.com",
  projectId:"netlink-agencies-6399e",
  storageBucket:"netlink-agencies-6399e.firebasestorage.app",
  messagingSenderId:"546397751362",
  appId:"1:546397751362:web:c74e057b2b0ceb6c0745db"
});
const auth = getAuth(app);
const db = getFirestore(app);

// IMPORTANT: Clear any admin session so it does not interfere
localStorage.removeItem('nlAdmin');

window.doLogin = async function(){
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  err.style.display='none';

  const username = document.getElementById('username').value.trim().toLowerCase();
  const pw = document.getElementById('password').value;

  if(!username||!pw){
    err.textContent='⚠️ Enter username and password.';
    err.style.display='block';
    return;
  }

  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span> Signing in...';

  try{
    // Find user by username in Firestore (convert to lowercase for search)
    const q = query(collection(db, 'users'), where('username', '==', username));
    const querySnapshot = await getDocs(q);
    
    if(querySnapshot.empty){
      throw new Error('Username not found');
    }
    
    // Get email from username
    const userDoc = querySnapshot.docs[0];
    const email = userDoc.data().email;
    const uid = userDoc.id;

    // Sign in with Firebase using email and password
    const cred = await signInWithEmailAndPassword(auth, email, pw);

    // Get full user data from Firestore
    const snap = await getDoc(doc(db, 'users', uid));

    if(snap.exists()){
      const data = snap.data();
      // Save user to localStorage
      localStorage.setItem('nlUser', JSON.stringify({...data, uid}));
      // Make sure admin is cleared
      localStorage.removeItem('nlAdmin');

      // Redirect to USER pages only — never admin
      if(data.activated){
        window.location.replace('https://netlinkagencies.linkpc.net/dashboard');
      } else {
        window.location.replace('https://netlinkagencies.linkpc.net/activate');
      }
    } else {
      // User doc not found
      window.location.replace('https://netlinkagencies.linkpc.net/activate');
    }

  }catch(e2){
    btn.disabled=false;
    btn.innerHTML='Login';
    err.textContent='Invalid username or password.';
    err.style.display='block';
    console.error('Login error:', e2);
  }
};
</script>
</body>
</html>
